<script>
const Q = {
1:[
{q:"不動産の価格は、効用、相対的稀少性及び有効需要の三者の相関結合によって生ずる経済価値を貨幣額で表示したものであるが、この経済価値自体は自然的、社会的、経済的及び行政的な要因の相互作用によって決定される。",a:true,e:"正しい。価格の定義と経済価値の決定要因の両方を正確に押さえた記述です。"},
{q:"土地の自然的特性として「個別性（非同質性、非代替性）」が挙げられているが、これは代替の原則と矛盾するため、鑑定評価においては個別性よりも代替性を優先して考える。",a:false,e:"誤り。個別性は土地の自然的特性として存在します。代替の原則は完全に同質でなくても代替可能な不動産間で価格が相互に関連することを述べたもので、個別性の否定ではありません。"},
{q:"不動産の鑑定評価は市場価値を表示する適正な価格の把握に代表されるが、市場性を有しない不動産についてもその利用現況等を前提とした経済価値を判定する場合がある。",a:true,e:"正しい。市場性を有しない不動産（公共施設等）の経済価値の判定も鑑定評価に含まれます。R6問2参照。"},
{q:"不動産鑑定士は、縁故若しくは特別の利害関係を有する場合であっても、公平な態度を保持できると自ら判断すれば鑑定評価を引き受けることができる。",a:false,e:"誤り。公平な鑑定評価を害するおそれのあるときは「原則として」引き受けてはなりません。自らの主観的判断では足りません。"},
{q:"不動産の価格は所有権の対価のみを表示するものであり、賃借権等の所有権以外の権利利益の対価は賃料として表示される。",a:false,e:"誤り。賃借権等の権利の対価も「価格」として形成され得ます。二つ以上の権利が同一の不動産上に存する場合、それぞれについて価格が形成されます。"},
{q:"借地権付建物の所有者がその敷地の所有権を取得して併合した場合、併合後の自用の建物及びその敷地の正常価格は、併合前の借地権付建物の正常価格と底地の正常価格の合計額を上回ることがある。",a:true,e:"正しい。併合の利益により市場性が向上するため、上回ります。R4問1で出題。"},
{q:"不動産は地域の構成分子として地域との間に「協働、代替、競争等」の関係にたち、地域内の他の不動産との間に「依存、補完等」の関係にたつ。",a:false,e:"誤り。逆です。地域との間に「依存、補完等」、地域内の他の不動産との間に「協働、代替、競争等」の関係にたちます。頻出の入替えパターン。"},
{q:"不動産の鑑定評価において、必要な関連諸資料の収集整理の適否及びこれらの諸資料の分析解釈の練達の程度は、鑑定評価の判断の当否に影響を与える。",a:true,e:"正しい。判断の当否は鑑定士の能力・誠実さに加え、資料の収集整理の適否と分析解釈の練達の程度に依存します。"},
{q:"不動産の価格（又は賃料）は、通常、過去と将来とにわたる長期的な考慮の下に形成されるが、これは住宅地域に限定された特性であり、商業地域では短期的な収益のみに基づいて形成される。",a:false,e:"誤り。長期的考慮は不動産の価格一般の特徴であり、地域の種類を問いません。"},
{q:"不動産鑑定士は、依頼者に対して鑑定評価の結果を分かり易く誠実に説明を行い得るようにするとともに、社会一般に対しても不動産の鑑定評価に対する信頼を高めるよう努めなければならない。",a:true,e:"正しい。依頼者への説明責任に加え、社会一般に対する信頼向上の努力義務があります。"},
{q:"鑑定評価の判断の当否は、不動産鑑定士の能力の如何のみに係るものであり、その能力の行使の誠実さの如何には係らない。",a:false,e:"誤り。判断の当否は能力の「如何」と「その能力の行使の誠実さの如何」の双方に係ります。"},
{q:"鑑定評価は、高度な知識と豊富な経験及び的確な判断力を持ち、これらが有機的かつ総合的に発揮できる練達堪能な専門家によってなされるとき、初めて合理的であって客観的に論証できるものとなる。",a:true,e:"正しい。知識・経験・判断力の有機的統一が鑑定評価の合理性・客観性の前提です。"},
{q:"不動産は通常、土地とその定着物をいうが、駐車場の設備やガスタンク等の構築物も常に不動産の鑑定評価の対象に含まれる。",a:false,e:"誤り。構築物が土地の定着物に該当するかは個別判断が必要であり「常に」含まれるわけではありません。R5問3ニ参照。"},
{q:"二つ以上の権利利益が同一の不動産の上に存する場合には、それぞれの権利利益について相互関係なくその価格が形成され得る。",a:false,e:"誤り。それぞれの権利利益について価格は形成されますが「相互関係なく」ではなく相互に関連して形成されます。R7問1(3)で出題。"},
{q:"不動産の現実の取引価格等から不動産の適正な価格を見出すことは一般の人には非常に困難であり、したがって不動産鑑定士の鑑定評価活動が必要となる。",a:true,e:"正しい。不動産の取引価格は個別的事情に左右されがちであり、適正な価格の把握には専門家が必要です。"},
{q:"不動産鑑定士は不断の勉強と研鑚が求められるが、これは経験の浅い鑑定士に限られ、経験豊富な鑑定士には求められない。",a:false,e:"誤り。経験の多寡を問わず全ての鑑定士に求められます。R5問2(4)参照。"},
{q:"不動産鑑定士は、良心に従い誠実に鑑定評価を行い、専門職業家としての社会的信用を傷つけるような行為をしてはならないが、正当な理由があれば職務上知り得た秘密を他に漏らすことができる。",a:true,e:"正しい。秘密保持義務は「正当な理由がなくて」漏らしてはならないとされており、正当な理由があれば許容されます。"},
{q:"不動産鑑定士は依頼者の利益を最大化することを最優先とし、鑑定評価の結果がそれに合致するよう努めなければならない。",a:false,e:"誤り。鑑定士は「公平妥当な態度を保持する」ことが求められ、依頼者の利益最大化ではありません。"},
{q:"不動産のあり方は自然的、社会的、経済的及び行政的な要因の相互作用によって決定されるとともに、経済価値の本質を決定づけている。",a:true,e:"正しい。不動産のあり方が経済価値の本質を決定づけていると基準に明記されています。"},
{q:"土地の人文的特性は固定的であって硬直的であり、自然的特性は可変的であって伸縮的である。",a:false,e:"誤り。逆です。自然的特性が「固定的・硬直的」、人文的特性が「可変的・伸縮的」です。"}
],
2:[
{q:"不動産の種別とは不動産の用途に関する分類をいい、類型とは有形的利用及び権利関係の態様に応じた分類をいう。",a:true,e:"正しい。種別は用途、類型は有形的利用・権利関係の態様に基づく分類です。"},
{q:"宅地地域のうちにあって居住用建物と商業用建物が混在している場合、その土地は「移行地」と判定される。",a:false,e:"誤り。移行地は同じ種別の地域内で細分された地域間の移行です。混在の場合は優勢な用途により住宅地域又は商業地域と判定します。"},
{q:"建付地は宅地の類型であるため、宅地見込地の類型が建付地となることはない。",a:false,e:"誤り。宅地に転換しつつある地域内の土地でも、既に建物が建てられ所有者が同一であれば建付地となり得ます。R5問3参照。"},
{q:"土地所有者Aが建物を建築しBに賃貸している場合、土地は建付地、建物及びその敷地は貸家及びその敷地である。",a:true,e:"正しい。土地と建物の所有者が同一（A）で建付地、建物が賃貸に供されているので貸家及びその敷地です。"},
{q:"農地地域の定義における観点は、自然的、物理的、経済的及び法令的観点である。",a:false,e:"誤り。正しくは「自然的、社会的、経済的及び行政的」です。「物理的」「法令的」は誤り。R7問3で出題。"},
{q:"準高度商業地域とは、主として行政機関、企業、金融機関等の事務所が高度に集積している地域をいう。",a:false,e:"誤り。この説明は高度商業地域の一類型の説明に近いものです。R7問3で出題。"},
{q:"更地とは建物等の定着物がなく使用収益を制約する権利の付着していない宅地をいうが、建物が存する場合でも独立鑑定評価の条件を設定して更地として評価できる。",a:true,e:"正しい。対象確定条件として建物が存しないものとする独立鑑定評価の条件設定が認められています。"},
{q:"底地とは借地権の付着している宅地の所有権をいうが、借地権の価格と底地の価格の合計は常に更地の価格と一致する。",a:false,e:"誤り。借地権と底地が併合された場合の市場性向上（併合の利益）があるため、更地価格が上回るのが通常です。"},
{q:"建物及びその敷地の類型には、自用の建物及びその敷地、貸家及びその敷地、借地権付建物、区分所有建物及びその敷地がある。",a:true,e:"正しい。建物及びその敷地の4類型です。"},
{q:"林地地域から宅地地域への転換だけでなく、林地地域から農地地域への転換も「見込地」に該当する。",a:true,e:"正しい。見込地は「宅地地域、農地地域、林地地域等の相互間」の転換です。R5問3ハ参照。"},
{q:"地域の種別は、宅地地域、農地地域、林地地域、見込地地域に分けられる。",a:false,e:"誤り。地域の種別は「宅地地域、農地地域、林地地域等」です。見込地は土地の種別であり地域の種別ではありません。"},
{q:"林地地域とは、林業生産活動のうち木竹の生育の用に供されることが合理的と判断される地域をいい、特用林産物の生育は含まない。",a:false,e:"誤り。林地地域は「木竹又は特用林産物の生育の用」です。特用林産物も含みます。"},
{q:"借地権付建物とは、借地権を権原とする建物が存する場合における当該建物及び借地権をいう。",a:true,e:"正しい。建物と借地権を一体としたものです。"},
{q:"区分地上権とは、工作物を所有するため、地下又は空間に上下の範囲を定めて設定された地上権をいう。",a:true,e:"正しい。区分地上権の定義どおりです。"},
{q:"土地所有者が自ら居住していた建物から退去し空室となった場合、建物及びその敷地の類型は貸家及びその敷地となる。",a:false,e:"誤り。賃貸借に供されていない以上、自用の建物及びその敷地として扱います。"},
{q:"不動産の種別と類型の両面の分析をまって初めて精度の高い鑑定評価が可能となるが、種別の分類は類型の分類よりも重要である。",a:false,e:"誤り。種別と類型はどちらも重要であり、基準は優劣をつけていません。"},
{q:"宅地の類型は更地、建付地、借地権、底地、区分地上権の5つのみである。",a:false,e:"誤り。区分所有権も宅地の類型に含まれます（マンション敷地の持分等）。"},
{q:"住宅地域はさらに細分化が可能であり、在来の農家住宅等を主とする集落地域も住宅地域の細分として考えられる。",a:true,e:"正しい。留意事項に住宅地域の細分化として集落地域が例示されています。R7問3ニ参照。"},
{q:"建付地とは、建物等の用に供されている敷地で、建物等及びその敷地が同一の所有者に属している宅地をいう。",a:true,e:"正しい。建付地の定義です。所有者の同一性が要件です。"},
{q:"移行地とは、宅地地域、農地地域、林地地域等の相互間において、ある種別の地域から他の種別の地域へと転換しつつある地域内の土地をいう。",a:false,e:"誤り。この説明は「見込地」の定義です。移行地は同じ種別の地域内での細分された地域間の移行です。"}
],
3:[
{q:"不動産の価格を形成する要因とは、不動産の効用及び相対的稀少性並びに不動産に対する有効需要の三者に影響を与える要因をいう。",a:true,e:"正しい。価格形成要因の定義です。"},
{q:"一般的要因は、自然的要因、社会的要因、経済的要因及び行政的要因に大別される。",a:true,e:"正しい。一般的要因の4分類です。"},
{q:"地域要因とは、個別的要因の相関結合によって各地域の特性を形成し、その地域に属する不動産の価格の形成に全般的な影響を与える要因をいう。",a:false,e:"誤り。地域要因は「一般的要因の相関結合」によるものです。「個別的要因の相関結合」ではありません。R6問5ニで出題。"},
{q:"「不動産の取引に関する規制の状態」は一般的要因のうち行政的要因として例示されている。",a:true,e:"正しい。行政的要因の第5項目として例示されています。なお、社会的要因に例示されているのは「不動産の取引及び使用収益の慣行」であり別の項目です。"},
{q:"商業地域と工業地域に共通する地域要因として「行政上の助成及び規制の程度」が例示されているが、農地地域と林地地域では例示されていない。",a:false,e:"誤り。農地地域・林地地域にも共通して例示されています。R5問5参照。"},
{q:"「地勢、地質、地盤等」は住宅地・商業地・工業地のすべてにおいて個別的要因として例示されている。",a:true,e:"正しい。R7問4で出題。3つの用途すべてで例示されています。"},
{q:"建物の各用途に共通する個別的要因について、市場参加者が着目する個別的要因は建物の用途毎に異なることに留意する必要がある。",a:true,e:"正しい。同じ個別的要因でも事務所ビルと住宅では着目点が異なります。R6問7参照。"},
{q:"事務所ビルにおいて特に留意すべき個別的要因と商業施設の個別的要因は同じものが例示されている。",a:false,e:"誤り。事務所は基準階床面積・天井高・床荷重・情報通信対応設備等、商業施設は売場面積・間口・奥行・顧客動線等が重視されます。R6問7で出題。"},
{q:"農地の個別的要因として「災害の危険性の程度」は例示されていない。",a:false,e:"誤り。農地の個別的要因の第8項目として「災害の危険性の程度」が明確に例示されています。"},
{q:"見込地及び移行地については、転換後・移行後の種別の土地の個別的要因を常に重視すべきである。",a:false,e:"誤り。転換・移行の程度が低い場合は転換前・移行前の要因をより重視すべきです。R6問7ロ参照。"},
{q:"「日照、温度、湿度、風向等の気象の状態」は住宅地域の地域要因として例示されているが、商業地域では例示されていない。",a:false,e:"誤り。住宅地域・商業地域・工業地域のいずれでも地域要因として例示されています。"},
{q:"「生活様式等の状態」は一般的要因のうち社会的要因として例示されている。",a:true,e:"正しい。生活様式等の状態は社会的要因の一つです。R5問5で出題。"},
{q:"土壌汚染の有無及びその状態は、住宅地・商業地・工業地のいずれにおいても個別的要因として例示されている。",a:true,e:"正しい。3つの用途すべてで例示されています。"},
{q:"鑑定評価を行うに当たっては、価格形成要因を市場参加者の観点から明確に把握し、その推移・動向・諸要因間の相互関係を十分に分析する必要がある。",a:true,e:"正しい。H26改正で「市場参加者の観点から」が追加された重要な記述です。"},
{q:"「接面街路の系統及び連続性」は住宅地と商業地の両方で個別的要因として例示されている。",a:true,e:"正しい。住宅地（第6項目）、商業地（第5項目）、工業地（第5項目）のいずれにおいても個別的要因として例示されています。"},
{q:"埋蔵文化財の有無及びその状態は、住宅地と商業地では個別的要因として例示されているが、工業地では例示されていない。",a:false,e:"誤り。住宅地・商業地・工業地のすべてで例示されています。R7問5ハ参照。"},
{q:"個別的要因は、不動産に個別性を生じさせ、その価格を個別的に形成する要因をいう。",a:true,e:"正しい。個別的要因の定義です。"},
{q:"賃貸用不動産の個別的要因のうち、賃借人の状況に関する留意事項として「賃料の滞納の有無」及び「賃借人の属性（業種、企業規模等）」が例示されている。",a:true,e:"正しい。留意事項に明記されています。"},
{q:"一般的要因の分析については鑑定評価報告書に必ず記載しなければならない。",a:false,e:"誤り。一般的要因の分析については「必ずしも鑑定評価報告書に記載する必要がない」とされています。R4問5(4)参照。"},
{q:"住宅地域の地域要因には「情報通信基盤の整備の状態」が含まれ、これは商業地域・工業地域でも同様に地域要因として例示されている。",a:true,e:"正しい。3つの用途地域すべてで地域要因として例示されています。"}
],
4:[
{q:"不動産の価格に関する諸原則は、一般の経済法則とは性質を異にし、鑑定評価独自の立場から表現したものである。",a:false,e:"誤り。諸原則は「一般の経済法則に基礎を置く」ものであり、独自のものではありません。R7問6イで出題。"},
{q:"代替の原則により不動産の価格は代替可能な他の不動産又は財の価格と相互に関連するが、不動産の固有の特性から他の財とは関連しない。",a:false,e:"誤り。「他の不動産又は財」の価格と関連します。不動産以外の財も含みます。R7問6ハ参照。"},
{q:"均衡の原則は不動産の内部の構成要素の組合せに着目し、適合の原則は不動産と外部環境との関係に着目する。",a:true,e:"正しい。均衡は内部バランス、適合は外部環境との調和です。R6問8参照。"},
{q:"予測の原則によれば、不動産の価格は市場参加者の予測によって左右されるが、この予測には過去の推移の分析が不可欠である。",a:true,e:"正しい。R4問8ホで「過去の推移の分析は不要」を誤りとする出題あり。"},
{q:"収益逓増及び逓減の原則は、単位投資額を継続的に増加させると総収益は増加する一方、単位投資額を減少させると総収益が減少するという原則である。",a:false,e:"誤り。「追加する単位投資額に対応する収益が、ある点まで増加し、その後減少する」という原則です。R6問8ホ参照。"},
{q:"競争の原則は代替の原則とも関連しており、不動産相互間及び他の財との間の競争の過程で不動産の価格は形成される。",a:true,e:"正しい。R6問8ニ参照。"},
{q:"最有効使用は客観的にみて判定されるものであるから、ある不動産の現実の使用方法は常に最有効使用に基づいている。",a:false,e:"誤り。「現実の使用方法は必ずしも最有効使用に基づいているものではない」と基準に明記されています。"},
{q:"変動の原則に関し、価格形成要因が常に変動の過程にあることを認識して、各要因間の相互因果関係を動的に把握すべきである。",a:true,e:"正しい。「動的に把握」する点が重要です。"},
{q:"割引率の求め方として「金融資産の利回りに不動産の個別性を加味して求める方法」は代替の原則の活用例といえる。",a:true,e:"正しい。代替可能な財の利回りとの関連で求める方法であり、代替の原則の活用例です。R4問8イ参照。"},
{q:"寄与の原則は個別不動産の構成部分に着目し、収益配分の原則は生産要素（土地・資本・労働・経営）に着目する。",a:true,e:"正しい。寄与は不動産の「ある部分」の貢献度、収益配分は各生産要素への配分に着目します。"},
{q:"不動産の価格に関する諸原則は、それぞれが孤立しており相互に関連しない。",a:false,e:"誤り。「孤立しているものではなく、直接的又は間接的に相互に関連している」と明記。過去問頻出。"},
{q:"最有効使用とは、現実の社会経済情勢の下で客観的にみて、良識と通常の使用能力を持つ人による合理的かつ合法的な最高最善の使用方法に基づくものである。",a:true,e:"正しい。最有効使用の定義です。「客観的」「良識と通常の使用能力を持つ人」がキーワード。"},
{q:"収益配分の原則によれば、土地・資本・労働及び経営の各要素の結合によって生ずる総収益のうち、土地に帰属する部分は資本・労働・経営に配分される部分以外の部分である。",a:true,e:"正しい。残余が土地に帰属します。土地残余法の基礎となる原則です。"},
{q:"最有効使用の判定には均衡の原則に基づく分析が必要であるが、変動の原則に基づく分析は不要である。",a:false,e:"誤り。最有効使用の判定には均衡の原則と変動の原則の両方の分析が必要です。"},
{q:"適合の原則とは、不動産の収益性又は快適性が最高度に発揮されるためには当該不動産がその環境に適合していることが必要であることをいう。",a:true,e:"正しい。不動産と環境との適合が収益性・快適性の最高度の発揮に必要です。"},
{q:"超過利潤は競争を惹起し競争は超過利潤を減少させる傾向を持つが、この競争の原則は不動産には当てはまらない。",a:false,e:"誤り。不動産にも当てはまります。「不動産についても超過利潤を求めて競争する力によって影響を受ける」と明記。"},
{q:"不動産の最有効使用を判定するためには均衡の原則だけでなく適合の原則も重要であり、当該不動産が社会的要請に適合しているかの分析も必要である。",a:true,e:"正しい。均衡と適合の両原則が最有効使用の判定に重要です。R6問8イ参照。"},
{q:"一つの不動産に対して複数の最有効使用を判定することが多い。",a:false,e:"誤り。最有効使用は一つの使用方法を判定するものです。ただし一棟内で複数用途が併存する使用方法を判定することは可能です。R6問8ロ参照。"},
{q:"需要と供給の原則によれば、不動産は他の財と異なる自然的特性及び人文的特性を有するため、その需要と供給及び価格の形成にはこれらの特性の反映が認められる。",a:true,e:"正しい。基準の記述どおりです。"},
{q:"寄与の原則は最有効使用の判定において均衡の原則とあわせて活用すべきものである。",a:true,e:"正しい。基準に「寄与の原則は最有効使用の判定に当たっては均衡の原則と関連させて活用すべき」と記載。"}
],
5:[
{q:"対象確定条件の設定においては、鑑定評価書の利用者の利益を害するおそれがないかの観点のほか、実現性及び合法性の観点からの検討も必要である。",a:false,e:"誤り。対象確定条件の設定で求められるのは「利用者の利益を害するおそれがないかどうかの観点」のみです。「実現性及び合法性」は地域要因又は個別的要因についての想定上の条件の要件であり、対象確定条件の要件ではありません。"},
{q:"未竣工建物等鑑定評価は竣工後の状態を前提とする評価であるが、これは将来時点の鑑定評価となる。",a:false,e:"誤り。未竣工建物等鑑定評価は将来時点の鑑定評価とはなりません。価格時点は現在時点として設定します。R7問7ニ参照。"},
{q:"正常価格の市場概念の要件「売り急ぎ、買い進み等をもたらす特別な動機のないこと」は、売買希望価格を参考とすることを排除するものではない。",a:true,e:"正しい。現実の売買希望価格を参考資料として活用することは排除されません。R7問9(1)参照。"},
{q:"限定価格を求める場合の例示として「借地権者が底地の併合を目的とする売買に関連する場合」がある。",a:true,e:"正しい。限定価格の例示の一つです。隣接不動産の併合、経済合理性に反する分割も例示されています。"},
{q:"特定価格とは、市場性を有する不動産について法令等による社会的要請を背景とする評価目的の下で正常価格の前提となる諸条件を満たさない場合における不動産の経済価値を適正に表示する価格をいう。",a:true,e:"正しい。特定価格の定義です。"},
{q:"投資法人等が投資対象資産を取得又は譲渡するいずれの場合の鑑定評価においても特定価格となる。",a:false,e:"誤り。譲渡の場合は正常価格を求める場合に該当し得ます。R7問9(5)参照。"},
{q:"過去時点の鑑定評価は、対象不動産の確認等が可能であり、かつ必要な要因資料及び事例資料の収集が可能な場合に限り行うことができる。",a:true,e:"正しい。2つの要件を共に満たす必要があります。"},
{q:"借地借家法に基づく賃料増減請求の場合、賃料改定の基準日が価格時点となる。",a:true,e:"正しい。留意事項に明記されています。R7問7ホで出題。"},
{q:"調査範囲等条件の設定には依頼者との合意は不要である。",a:false,e:"誤り。条件設定には依頼者との鑑定評価依頼契約上の合意が必要です。"},
{q:"想定上の条件の設定が認められるのは対象確定条件に関するものと価格形成要因に関するものがあり、いずれも実現性及び合法性が要件の一つである。",a:false,e:"誤り。想定上の条件は「地域要因又は個別的要因について」設定されるものであり、対象確定条件に関する想定上の条件というカテゴリは存在しません。実現性及び合法性は想定上の条件（価格形成要因に関するもの）の要件です。"},
{q:"特殊価格とは、文化財等の一般的に市場性を有しない不動産について、その利用現況等を前提とした不動産の経済価値を適正に表示する価格をいう。",a:true,e:"正しい。特殊価格の定義です。文化財の建造物、宗教建築物、公共公益施設等が例示されています。"},
{q:"正常価格を求める場合、買主が通常の資金調達能力を有していることが市場の要件の一つであるが、通常の資金調達能力とは全額自己資金で購入する能力をいう。",a:false,e:"誤り。通常の資金調達能力とは「市場における標準的な借入条件の下での借り入れと自己資金とによって資金調達を行うことができる能力」です。全額自己資金ではありません。"},
{q:"「相当の期間市場に公開されていること」の「公開されていること」とは、価格時点において既に市場で公開されていた状況を想定することをいう。",a:true,e:"正しい。留意事項に明記。価格時点以降売買成立時まで公開されることではない点に注意。"},
{q:"将来時点の鑑定評価は原則として行うべきではないが、特に必要がある場合において鑑定評価上妥当性を欠くことがないと認められるときは設定できる。",a:true,e:"正しい。将来時点は限定的に認められています。R6問11(3)参照。"},
{q:"賃料の価格時点は、賃料の算定の期間の収益性を反映するものとしてその期間の期首又は期末となる。",a:false,e:"誤り。賃料の価格時点は「期首」となります。「期首又は期末」ではありません。R6問11(5)参照。"},
{q:"証券化対象不動産の鑑定評価や会社法上の現物出資目的の鑑定評価等では、原則として想定上の条件及び調査範囲等条件の設定をしてはならない。",a:true,e:"正しい。利用者の利益に重大な影響を及ぼす可能性がある場合の条件設定の制限です。"},
{q:"限定価格を求める場合として、併合と分割の両方を同時に行うことを前提とする鑑定評価を行うことはできない。",a:false,e:"誤り。併合と分割を同時に行う前提での鑑定評価も可能です。R7問9(2)参照。"},
{q:"条件設定が妥当ではないと認められる場合には、依頼者に説明の上、妥当な条件に改定しなければならない。",a:true,e:"正しい。基準に明記されています。"},
{q:"価格時点は、鑑定評価を行った年月日を基準として現在時点、過去時点及び将来時点に分けられるが、実地調査を行った年月日を基準とするのではない。",a:true,e:"正しい。基準は「鑑定評価を行った年月日を基準として」としています。「実地調査を行った年月日」ではありません。R7問7ハ参照。"},
{q:"継続賃料とは、不動産の賃貸借等の継続に係る特定の当事者間において成立するであろう経済価値を適正に表示する賃料をいう。",a:true,e:"正しい。継続賃料の定義です。新規賃料と異なり特定の当事者間のものです。"}
],
6:[
{q:"地域分析とは、その対象不動産がどのような地域に存するか等を分析し、近隣地域の標準的使用及び対象不動産の最有効使用を判定することをいう。",a:false,e:"誤り。地域分析は「標準的使用」を判定するものであり、「最有効使用」は個別分析の役割です。R6問12ハ参照。"},
{q:"同一需給圏内の類似地域は近隣地域に必ずしも隣接する必要はなく、離れた地域でも地域要因の類似性に基づき類似地域となり得る。",a:true,e:"正しい。物理的に隣接している必要はありません。R7問11イ参照。"},
{q:"市場の特性は標準的使用の判定だけでなく手法の適用や試算価格の調整等にも反映すべきである。",a:true,e:"正しい。市場の特性は鑑定評価の各段階で反映すべきとされています。"},
{q:"居住用不動産の市場参加者の属性把握で特に留意すべきは、主たる需要者層の業種、業態、法人か個人かの別である。",a:false,e:"誤り。これは業務用不動産の留意事項です。居住用は年齢、家族構成、所得水準等。R7問12ロ参照。"},
{q:"建物及びその敷地の最有効使用が更地としての最有効使用と異なる場合、直ちに建物の取壊しを最有効使用と判定すべきである。",a:false,e:"誤り。収益変動予測の不確実性、逸失利益等を総合的に勘案して判定します。R7問13ロ・ニ参照。"},
{q:"近隣地域の範囲判定では、河川や山岳のほか、鉄道、公園、広幅員の道路も地域の一体性を分断する場合があることに留意すべきである。",a:true,e:"正しい。自然的状態と人文的状態の両面が留意事項に例示されています。"},
{q:"高度商業地の同一需給圏は広域的な商業背後地を基礎に成り立つが、地縁的選好性により範囲が狭められることがある。",a:false,e:"誤り。高度商業地では地縁的選好性は通常低いです。地縁的選好性で範囲が狭まるのは住宅地。R7問11ハ参照。"},
{q:"個別分析における最有効使用は標準的使用との相互関係を踏まえて判定されるが、両者は必ずしも一致するとは限らない。",a:true,e:"正しい。対象不動産の位置・規模等によっては異なる用途の可能性もあります。"},
{q:"大工場地の同一需給圏は、一般に原料等の入手の便否に関して代替性を有する範囲に一致する傾向がある。",a:false,e:"誤り。大工場地は「高度の輸送機関に関して代替性を有する範囲」で全国的規模となる傾向。原料の入手は中小工場地の記述。R7問11ニ参照。"},
{q:"見込地・移行地の地域分析では、特に周辺地域の地域要因の変化の推移・動向が動向予測に有効な資料となる。",a:true,e:"正しい。留意事項に明記されています。R7問10(3)参照。"},
{q:"地域分析に当たって特に重要な地域は、近隣地域及びその類似地域と同一需給圏であるが、近隣地域は同一需給圏に含まれないこともある。",a:false,e:"誤り。同一需給圏は近隣地域を含んでより広域的なものです。近隣地域は常に同一需給圏に含まれます。R6問12イ参照。"},
{q:"近隣地域の特性は、通常、その地域に属する不動産の一般的な標準的使用に具体的に現れる。",a:true,e:"正しい。基準の記述どおりです。"},
{q:"同一需給圏における市場参加者の属性・行動を把握する際、販売中の不動産に係る不動産業者への聴聞は不要である。",a:false,e:"誤り。不動産業者への聴聞も有用な情報源です。R7問12ホは「不要」としており誤り。"},
{q:"住宅地の同一需給圏は一般に都心への通勤可能な地域の範囲に一致する傾向があるが、地縁的選好性により狭められる傾向がある。",a:true,e:"正しい。留意事項の記述どおりです。地域の名声・品位等による選好性も影響します。"},
{q:"個別分析において最有効使用は価格時点において効用を十分に発揮している使用方法であり、将来にわたって持続し得る使用方法であることに留意すべきである。",a:true,e:"正しい。R7問13ハ参照。将来の持続可能性も重要です。"},
{q:"一般的要因は地域分析及び個別分析の基礎として、鑑定評価手法の適用における各手順において常に考慮されるべきものである。",a:true,e:"正しい。R6問12ロ参照。一般的要因は全手順の基礎です。"},
{q:"移行地の同一需給圏は、一般に当該土地が移行すると見込まれる土地の種別の同一需給圏と常に一致する。",a:false,e:"誤り。熟成度の低い場合には移行前の土地の種別の同一需給圏と同一になる傾向があります。「常に」ではありません。"},
{q:"近隣地域の地域分析は対象不動産を中心に外延的に広がる地域について地域要因をくり返し調査分析し、その異同を明らかにしなければならない。",a:true,e:"正しい。留意事項に明記されています。R7問10(1)参照。"},
{q:"建物及びその敷地の最有効使用が建物の取壊しと判定された場合、建物についての個別的要因の分析は省略できる。",a:false,e:"誤り。取壊しの判定においても建物の個別的要因（解体費の把握等含む）の分析は必要です。R7問13ホ参照。"},
{q:"個別的要因の分析結果は、鑑定評価の手法の適用、試算価格又は試算賃料の調整等における各種の判断においても反映すべきである。",a:true,e:"正しい。個別分析の結果は手法の適用や調整にも反映します。R6問13参照。"}
],
7:[
{q:"原価法における再調達原価を求める方法には直接法及び間接法があるが、収集した建設事例等の資料の信頼度に応じていずれかを適用し、必要に応じて併用する。",a:true,e:"正しい。基準の記述どおりです。"},
{q:"減価修正の方法には耐用年数に基づく方法と観察減価法があり、これらを併用するものとされている。",a:true,e:"正しい。基準では「併用するもの」とされています。"},
{q:"減価の要因のうち「不動産を使用することによって生ずる摩滅及び破損」は機能的要因に該当する。",a:false,e:"誤り。これは物理的要因です。機能的要因は設計不良・型式の旧式化等。R6問15ロ参照。"},
{q:"取引事例比較法の事情補正において、「相続、転勤等により売り急いだ取引」は増額補正が必要な特殊な事情の例示である。",a:true,e:"正しい。留意事項の事情補正について「イ．補正に当たり増額すべき特殊な事情」の(イ)として「相続、転勤等により売り急いで取引が行われたとき」が明記されています。売り急ぎにより通常価格より安く成立したため増額補正が必要です。"},
{q:"DCF法で復帰価格を求める際、n+1期の純収益を最終還元利回りで還元する場合、n+1期以降の不確実性をn+1期の純収益及び最終還元利回りに反映させることが必要である。",a:true,e:"正しい。留意事項の記述どおりです。R6問18参照。"},
{q:"還元利回りの求め方として「割引率との関係から求める方法」があり、R＝Y－gの式で表される。",a:true,e:"正しい。純収益が永続的に得られ一定の趨勢を有する場合に有効です。"},
{q:"事業用不動産とは賃貸以外の事業の用に供する不動産のうち収益性が事業経営の動向に強く影響を受けるものをいうため、類型が貸家及びその敷地であれば事業用不動産に該当しない。",a:false,e:"誤り。貸家及びその敷地でも事業用不動産に該当し得ます。R4問11(5)参照。"},
{q:"賃貸事業分析法とは、一般企業経営に基づく総収益を分析して純収益を求める手法である。",a:false,e:"誤り。賃貸事業分析法は「賃貸用不動産の賃貸事業に基づく純収益」を分析するものです。"},
{q:"取引事例が近隣地域に存する場合、地域要因の比較は不要であるが個別的要因の比較は必要である。",a:true,e:"正しい。近隣地域内は地域要因が共通なので比較不要ですが、個別的要因は必要。R7問14ホ参照。"},
{q:"継続賃料を求める場合の留意事項として、現行賃料を定めた事情・経緯等、賃料改定の経緯等に留意すべきとされている。",a:true,e:"正しい。H26改正で追加された留意事項です。"},
{q:"耐用年数に基づく方法における経済的残存耐用年数とは、価格時点において対象不動産の効用が十分に持続すると考えられる期間をいい、この方法の適用に当たり特に重視されるべきものである。",a:true,e:"正しい。基準に「特に重視されるべき」と明記されています。"},
{q:"耐用年数に基づく方法は、対象不動産の価格時点における経過年数及び物理的残存耐用年数の和として把握される耐用年数を基礎とする。",a:false,e:"誤り。「経済的残存耐用年数」の和です。「物理的残存耐用年数」ではありません。R6問15ニ参照。"},
{q:"還元利回りの求め方として「借入金と自己資金に係る還元利回りから求める方法」は資金調達の要素に着目した方法であり、金融市場の動向を反映させることに優れている。",a:true,e:"正しい。基準にR＝RM×WM＋RE×WEの式が例示されています。"},
{q:"DCF法における保有期間は、毎期の純収益及び復帰価格について精度の高い予測が可能な期間として決定し、典型的な投資家が保有する期間を標準とする。",a:true,e:"正しい。R7問15(5)参照。"},
{q:"一時金のうち預り金的性格を有する保証金等について、全額を返還準備金として預託しその運用益を計上する方法と、全額を受渡時の収入又は支出として計上する方法がある。",a:true,e:"正しい。R7問15(3)参照。2つの方法が認められています。"},
{q:"DCF法において建物等の純収益の算定では、基本的に減価償却費を控除した償却後の純収益を用いる。",a:false,e:"誤り。基本的には「減価償却費を控除しない償却前の純収益」を用い、建物の償却については割引率において考慮されます。R7問15(2)参照。"},
{q:"事業用不動産に係る収益性の分析では、依頼者等から提出された事業実績や事業計画等のみに依拠して行うべきである。",a:false,e:"誤り。当該資料は有用ですが、それのみに依拠するのではなく、運営事業者の視点から持続性・実現性を十分に検討しなければなりません。R7問16ニ参照。"},
{q:"運営事業者の超過収益は本来運営事業者の経営に帰属するが、賃貸借契約において超過収益の一部が不動産所有者に安定的に帰属する合意がある場合、当該事業用不動産に帰属する場合がある。",a:true,e:"正しい。R7問16ホ参照。"},
{q:"取引事例は不動産の利用目的等により考慮すべき視点が異なるため、取引事情・取引当事者の属性・取引価格の水準の変動の推移を慎重に分析しなければならない。",a:true,e:"正しい。R7問14イ参照。"},
{q:"時点修正率は原則として地価公示・都道府県地価調査等の資料を活用し、適切な事例が乏しい場合は売り希望価格等の動向も参考とする。",a:true,e:"正しい。R7問14ニ参照。"}
],
8:[
{q:"処理計画の策定に当たっては、依頼者に対し実地調査の範囲や他の専門家による調査結果等の活用の要否等を確認し、処理計画に反映する。",a:true,e:"正しい。確認事項に変更があった場合は処理計画を変更します。R6問22ハ参照。"},
{q:"市場の特性等を最も適切に反映している手法が明確であっても、他の手法の適用についても検討しなければならない。",a:true,e:"正しい。複数手法の適用が原則です。R6問22ロを誤りとする出題参照。"},
{q:"試算価格の調整とは、各鑑定評価手法の再吟味と各試算価格が有する説得力に係る判断を行い鑑定評価額の決定に導く作業をいう。",a:false,e:"誤り。基準では「各試算価格又は試算賃料の再吟味」であり、「各鑑定評価手法の再吟味」ではありません。再吟味の対象は手法ではなく試算価格（又は試算賃料）です。R6問22ニ参照。"},
{q:"適用する鑑定評価の手法は不動産鑑定士が判断すべき事項であるため、依頼者への確認事項には含まれない。",a:true,e:"正しい。手法の選択は鑑定士の専門的判断です。R6問21参照。"},
{q:"同一の不動産の再評価を行う場合、個別的要因に重要な変化がないと判断すれば内覧を省略できる場合がある。",a:true,e:"正しい。ただし省略の根拠は鑑定評価報告書に記載が必要です。"},
{q:"価格形成要因が十分に判明しない場合、直ちに鑑定評価を中止しなければならない。",a:false,e:"誤り。原則として他の専門家の調査結果等を活用します。R6問22イ参照。"},
{q:"試算価格の再吟味で特に留意すべき事項には「各手法に共通する価格形成要因に係る判断の整合性」が含まれる。",a:true,e:"正しい。R7問22参照。"},
{q:"依頼者、提出先等及び利害関係等の確認は、H21改正で追加された手順である。",a:true,e:"正しい。価格等調査ガイドラインの整備に伴う追加です。"},
{q:"鑑定評価額の公表の有無は、依頼者に確認すべき事項に含まれる。",a:true,e:"正しい。確認事項の一つです。"},
{q:"関与鑑定士・鑑定業者と依頼者との間に特別の資本的・人的・取引関係がある場合でも、これを明らかにする義務はない。",a:false,e:"誤り。特別の関係がある場合は明らかにしなければなりません。"},
{q:"対象不動産の確認においては、実地調査を行った不動産鑑定士の氏名、実地調査を行った年月日、立会人の氏名及び職業を記載しなければならない。",a:true,e:"正しい。鑑定評価報告書に記載すべき実地調査に関する事項です。"},
{q:"資料の検討及び価格形成要因の分析において、他の専門家が行った調査結果等を活用する場合、その活用の適否について鑑定評価を行う不動産鑑定士が主体的に判断する必要がある。",a:true,e:"正しい。R4問2ニ参照。他の専門家の成果物の活用は鑑定士の責任で判断します。"},
{q:"依頼者との間で条件設定に係る鑑定評価依頼契約上の合意がなくても、対象不動産の現実の利用状況を所与とする場合は条件設定ができる。",a:false,e:"誤り。現実の利用状況を所与とする場合であっても省略が認められるわけではなく、条件設定には依頼者との合意が必要です。R6問11(4)参照。"},
{q:"前事業年度において依頼者からの出資が鑑定業者の資本の過半を占める場合は、明らかにすべき特別の資本的関係に該当する。",a:true,e:"正しい。R7問20イ参照。"},
{q:"前事業年度において依頼者との取引額が鑑定業者の鑑定評価等業務の受注額の半分に相当する額を超える場合は、特別の取引関係に該当する。",a:true,e:"正しい。留意事項に「当該依頼者と当該不動産鑑定業者の取引額が当該不動産鑑定業者の鑑定評価等業務における受注額の半分に相当する額を超える場合」が特別の取引関係の例示として明記されています。"},
{q:"鑑定評価の基本的事項の確定において、対象不動産について求める価格又は賃料の種類は依頼者が判断するものであり、不動産鑑定士は関与しない。",a:false,e:"誤り。価格又は賃料の種類は「不動産鑑定士が」依頼目的に対応した条件を踏まえて適切に判断し明確にすべきです。R7問2イ参照。"},
{q:"実地調査の一部を実施できなかった場合はその理由を鑑定評価報告書に記載しなければならない。",a:true,e:"正しい。基準に明記されています。"},
{q:"鑑定評価の手順は、鑑定評価の基本的事項の確定に始まり、鑑定評価報告書の作成をもって終了する。",a:true,e:"正しい。基本的事項の確定→確認→処理計画→確認→資料収集→分析→手法適用→調整→鑑定評価額決定→報告書作成の流れです。"},
{q:"専門職業家としての良心に従い適正と判断される鑑定評価額を決定したときは、鑑定評価報告書を依頼者に交付するものとする。",a:true,e:"正しい。R6問22ホ参照。"},
{q:"試算価格の再吟味で留意すべき事項として、各手法の適用で採用した資料の特性及び限界からくる相対的信頼性がある。",a:true,e:"正しい。R7問22(4)参照。"}
],
9:[
{q:"鑑定評価報告書は不動産鑑定士が自己の専門的学識と経験に基づいた判断と意見を表明し、依頼者のみならず第三者にも影響を及ぼすものである。",a:true,e:"正しい。そのため誤解の余地を与えないよう留意する必要があります。"},
{q:"特定価格を求めた場合には法令等による社会的要請の根拠を明らかにしなければならないが、特殊価格の場合は特段の記載義務はない。",a:false,e:"誤り。特殊価格の場合は「文化財の指定の事実等」を明らかにしなければなりません。"},
{q:"建物及びその敷地の鑑定評価では、鑑定評価報告書に建物及びその敷地の最有効使用に加え、更地としての最有効使用も記載しなければならない。",a:true,e:"正しい。R6問23参照。"},
{q:"「地域分析及び個別分析に係る事項」では同一需給圏及び近隣地域の範囲等を記載するが、類似地域の範囲の記載は求められていない。",a:true,e:"正しい。「同一需給圏及び近隣地域」の記載が求められています。R6問24参照。"},
{q:"争訟等の当事者間で主張が異なる事項は当事者の同意を得なくとも鑑定評価報告書に記載しなければならない。",a:true,e:"正しい。当事者の同意は要件ではありません。R7問24(1)参照。"},
{q:"公示区域において土地の正常価格を求めた場合、対象不動産の類型が更地でなくても公示価格との規準に関する事項を記載しなければならない。",a:true,e:"正しい。更地に限定されていません。R6問23(5)参照。"},
{q:"附属資料には位置を明示した地図、登記事項証明書、対象不動産の写真等が含まれる。",a:true,e:"正しい。基準に例示されています。"},
{q:"調査範囲等条件を設定した場合、他の専門家が調査した範囲や内容まで記載する必要はない。",a:false,e:"誤り。他の専門家が調査した範囲及び内容も明確にしなければなりません。"},
{q:"利害関係等がない場合はその旨の記載は不要である。",a:false,e:"誤り。利害関係等がない場合も「ない旨」の記載が必要です。"},
{q:"鑑定評価報告書には価格時点及び鑑定評価を行った年月日を記載しなければならない。",a:true,e:"正しい。別個の事項として両方記載が必要です。"},
{q:"鑑定評価報告書は不動産鑑定士の責任の所在を示すものであるが、不動産鑑定業者の責任の所在までは示すことを主旨としない。",a:true,e:"正しい。基準原文は「その不動産の鑑定評価に関与した不動産鑑定士の責任の所在を示すことを主旨とする」と規定しており、不動産鑑定業者の責任の所在については言及していません。"},
{q:"確認した事項については、後日疑義が生じないよう、確認方法（書面によるか口頭によるかの別等）及び確認資料について記載する。",a:true,e:"正しい。留意事項に明記されています。"},
{q:"鑑定評価手法の適用ができない場合、対象不動産の市場の特性に係る分析結果等に照らしその合理的な理由を記載する。",a:true,e:"正しい。留意事項に明記されています。"},
{q:"支払賃料を求めた場合はその支払賃料と実質賃料との関連を記載しなければならない。",a:true,e:"正しい。また継続賃料を求めた場合は直近合意時点についても記載が必要です。"},
{q:"鑑定評価上の不明事項は、鑑定評価における資料収集の限界等によって明らかにできない事項が存する場合の評価上の取扱いを記載しなければならない。",a:true,e:"正しい。不動産鑑定士が自ら行った調査の範囲・内容も明確にする必要があります。"},
{q:"対象不動産に建物が存するものの更地として独立鑑定評価を行った場合、鑑定評価額のほか、かっこ書きで建物及びその敷地の額を併記する必要はない。",a:false,e:"誤り。独立鑑定評価の場合は条件を前提とした額を表示するとともに、かっこ書きで建物及びその敷地の額である旨を付記しその額を併記しなければなりません。R6問23(3)参照。"},
{q:"鑑定評価額は価格時点までに入手した資料を基に決定されるため、鑑定評価を行った年月日の記載は不要であり、価格時点の記載のみで足りる。",a:false,e:"誤り。価格時点と鑑定評価を行った年月日は別の記載事項です。R6問23(2)参照。"},
{q:"依頼者並びに提出先及び利害関係等に関する事項は鑑定評価報告書の記載事項に含まれる。",a:true,e:"正しい。記載事項として明記されています。"},
{q:"対象不動産の種別及び類型に応じた各論第1章から第3章に規定する手法の適用と市場の特性等との関係を記載しなければならない。",a:true,e:"正しい。手法の適用に関する記載事項です。"},
{q:"試算価格又は試算賃料の再吟味及び説得力に係る判断の結果は鑑定評価報告書に記載しなければならない。",a:true,e:"正しい。鑑定評価額の決定の理由の要旨に含まれます。"}
],
10:[
{q:"更地の鑑定評価額は更地の取引事例に基づく比準価格及び土地残余法による収益価格を関連づけるが、配分法適用の場合は建物及びその敷地の取引事例に基づく比準価格も活用できる。",a:true,e:"正しい。R6問25(1)参照。"},
{q:"建付地の鑑定評価額は、更地の価格をもとに最有効使用との格差や更地化の難易度等を考慮して求めた価格を標準とする。",a:true,e:"正しい。建付地は更地の価格を基礎とします。"},
{q:"借地権の取引慣行の成熟度の低い地域における借地権の鑑定評価額は、取引事例に基づく比準価格を標準として決定する。",a:false,e:"誤り。成熟度低い地域では土地残余法の収益価格を標準とし、賃料差額還元や更地価格から底地を控除した価格を比較考量します。"},
{q:"自用の建物及びその敷地で建物取壊しが最有効使用と判定された場合、鑑定評価額は更地価格を下回ることがある。",a:true,e:"正しい。取壊し費用等の控除により更地価格を下回ります。R6問26ニ参照。"},
{q:"貸家及びその敷地の収益価格を求めるにあたっては直接還元法とDCF法を併用することが必須である。",a:false,e:"誤り。貸家及びその敷地では「収益価格を標準とし」とされるのみで、直接還元法とDCF法の併用は必須とされていません。DCF法の適用が必須とされるのは証券化対象不動産（各論第3章）です。"},
{q:"区分所有建物及びその敷地の積算価格を求める場合、直接法と間接法があり必要に応じて併用する。",a:true,e:"正しい。R6問28(3)参照。"},
{q:"熟成度の高い宅地見込地の鑑定評価は比準価格を標準とする。",a:false,e:"誤り。熟成度の「高い」場合は転換後の土地の種別に基づく価格を標準、「低い」場合は比準価格を標準。R7問27ハ参照。"},
{q:"底地の鑑定評価額は、実際支払賃料に基づく純収益等の現在価値の総和を求めた収益価格及び比準価格を関連づけて決定する。",a:true,e:"正しい。R6問25(4)参照。"},
{q:"借地権の存在は必ずしも借地権の価格の存在を意味するものではない。",a:true,e:"正しい。取引慣行の成熟度が低い地域等では価格が形成されない場合もあります。R7問25イ参照。"},
{q:"建物及びその敷地が一体として市場性を有する場合の建物のみの鑑定評価は部分鑑定評価として行い、配分して求めた価格を標準とすることもできる。",a:true,e:"正しい。R6問29ロ・ハ参照。"},
{q:"更地の鑑定評価額の決定において、更地の面積等によっては開発法による価格を比較考量することがある。",a:true,e:"正しい。大規模な画地等では開発法が有効です。"},
{q:"借地権付建物の鑑定評価において定期借地権の場合、一般に残存期間が短くなるに従い経済価値は低下する。",a:true,e:"正しい。更新がなく契約が必ず終了するためです。R7問28(2)参照。"},
{q:"区分地上権の鑑定評価額は、設定事例等に基づく比準価格、土地残余法に準じた収益価格及び立体利用率による価格を関連づけた価格を標準とする。",a:true,e:"正しい。R6問25(5)参照。"},
{q:"自用の建物及びその敷地の鑑定評価において、収益還元法は市場性を有しない不動産以外には基本的にすべて適用すべきものであり、賃貸を想定することにより適用される。",a:true,e:"正しい。R6問26ハ参照。"},
{q:"建物を取り壊すことが最有効使用と判断される自用の建物及びその敷地の類型は建付地となるため、部分鑑定評価の条件設定が必要である。",a:false,e:"誤り。取壊しが最有効使用と判定されても、類型は「自用の建物及びその敷地」のままです。建付地は宅地の類型です。R6問26ホ参照。"},
{q:"宅地見込地の鑑定評価では付近における公共施設・公益的施設の整備動向を勘案するものとする。",a:true,e:"正しい。R7問27イ参照。"},
{q:"借地権付建物の鑑定評価においてDCF法を適用する場合、売却時の譲渡承諾料等の一時金は借地権付建物の経済価値を低下させる要因となる。",a:true,e:"正しい。一時金の支出は価値を低下させます。R7問28(3)は「高める」としており誤り。"},
{q:"建物及びその敷地が一体として市場性を有しない場合の建物のみの鑑定評価は、一般に特殊価格を求める場合に該当する。",a:true,e:"正しい。文化財建造物等が該当します。R6問29ニ参照。"},
{q:"借地権及び底地の鑑定評価では、借地権取引の態様として名義書替料を一般に譲受人又は譲渡人のいずれが負担する地域であるかを考慮すべきである。",a:true,e:"正しい。R7問25ハ参照。"},
{q:"貸家及びその敷地の鑑定評価では、将来における賃料の改定の実現性とその程度等を総合的に勘案する必要がある。",a:true,e:"正しい。R6問27(3)参照。"}
],
11:[
{q:"新規賃料の鑑定評価手法には、積算法、賃貸事例比較法、収益分析法及び賃貸事業分析法がある。",a:true,e:"正しい。賃貸事業分析法はH26改正で新設されました。"},
{q:"積算法の基礎価格は原価法及び取引事例比較法により求めるが、収益還元法による価格は関連づけることができない。",a:false,e:"誤り。期待利回りを的確に把握できる場合は収益還元法も関連づけて求めます。R7問18ニ参照。"},
{q:"継続賃料の手法には差額配分法、利回り法、スライド法及び賃貸事例比較法がある。",a:true,e:"正しい。継続賃料の4手法です。"},
{q:"利回り法の基礎価格は直近合意時点における基礎価格である。",a:false,e:"誤り。利回り法の基礎価格は「価格時点における基礎価格」です。R7問19ニ参照。"},
{q:"賃貸事例比較法の事例選択では契約内容の類似性が重要であり、賃貸形式、契約期間、修理に関する事項等が判断要素となる。",a:true,e:"正しい。R6問20参照。"},
{q:"差額配分法では、適正な賃料と実際賃料の差額の全額が賃貸人に帰属するものとして試算賃料を求める。",a:false,e:"誤り。差額のうち「賃貸人に帰属する部分」を適切に判定して求めます。全額ではありません。"},
{q:"新規賃料の賃貸事例と継続賃料の賃貸事例は性質が異なるため、一般に同一の事例を両方に採用することはない。",a:true,e:"正しい。R7問19イ参照。"},
{q:"宅地の正常賃料の鑑定評価において、純賃料が負となる場合は鑑定評価を行えない。",a:false,e:"誤り。純賃料が負でも必要諸経費等を加算した支払賃料としての評価は可能です。"},
{q:"店舗用ビルの基礎価格判定では、内装等が賃借人の費用負担で施工されることがあるため留意すべきである。",a:true,e:"正しい。R7問18ホ参照。"},
{q:"継続賃料の試算過程で対象不動産が入居中の場合、空室等による損失相当額は計上不要である。",a:true,e:"正しい。特定の当事者間の賃料であり入居中なら空室リスクは不要です。R7問19ホ参照。"},
{q:"実質賃料とは賃貸人等に支払われる賃料の算定期間に対応する適正なすべての経済的対価をいい、純賃料及び必要諸経費等から成る。",a:true,e:"正しい。実質賃料の定義です。"},
{q:"支払賃料は実質賃料から一時金の運用益及び償却額を控除して求める。",a:true,e:"正しい。基準の記述どおりです。"},
{q:"賃料の算定の期間は、宅地並びに建物及びその敷地の賃料にあっては原則1月を単位とする。",a:true,e:"正しい。その他の土地にあっては1年を単位とします。"},
{q:"継続賃料の直近合意時点とは、契約締結時点のみを指し、その後の賃料改定時点は含まれない。",a:false,e:"誤り。直近合意時点は現行賃料が合意された時点であり、契約締結時に限らず、その後の賃料改定時点も含まれます。"},
{q:"スライド法は、直近合意時点における純賃料に変動率を乗じて得た額に、価格時点における必要諸経費等を加算して求める手法である。",a:true,e:"正しい。スライド法の基本的な考え方です。"},
{q:"収益分析法は、一般の企業経営に基づく総収益を分析して対象不動産が一定期間に生み出すであろう純収益を求め、これに必要諸経費等を加算して試算賃料を求める手法である。",a:true,e:"正しい。収益分析法の定義です。"},
{q:"基礎価格は積算賃料を求めるための基礎となる価格であるため、積算法以外の手法で用いられることはない。",a:false,e:"誤り。基礎価格は積算法だけでなく、利回り法やスライド法等でも用いられます。R7問18イ参照。"},
{q:"預り金的性格を有する敷金が授受されている場合、当該敷金に償却額がなければ運用益のみが実質賃料と支払賃料の差となる。",a:true,e:"正しい。預り金的性格の一時金は運用益のみが実質賃料を構成し、償却額は生じません。"},
{q:"隣接宅地の併合使用を前提とする賃貸借の場合に求めるべき賃料は限定賃料である。",a:true,e:"正しい。限定賃料を求めることができる場合の例示の一つです。"},
{q:"継続賃料の鑑定評価では、現行賃料を合意しそれを適用した直近合意時点以降の経済事情等の変動を考慮すべきである。",a:true,e:"正しい。基準に直近合意時点以降の公租公課、土地及び建物価格、近隣地域の賃料水準等の変動を考慮すべきと明記されています。"}
],
12:[
{q:"証券化対象不動産の鑑定評価は各論第3章に従って行わなければならないが、従前に評価済みのものの再評価はこの限りでない。",a:false,e:"誤り。再評価であっても各論第3章に従わなければなりません。"},
{q:"証券化対象不動産以外でも、投資用賃貸大型不動産の鑑定評価等では各論第3章に準じて行うよう努めなければならない。",a:true,e:"正しい。投資家・購入者等の保護の観点から努力義務があります。"},
{q:"証券化対象不動産の鑑定評価で投資採算価値を求める場合、投資法人等の運用方法が最有効使用と異なるときは最有効使用を前提に評価する。",a:false,e:"誤り。資産運用方法を所与とした特定価格を求めます。R6問30(2)参照。"},
{q:"証券化対象不動産の鑑定評価では、DCF法により求めた試算価格を標準とし、直接還元法による検証を行い、比準価格及び積算価格で検証する。",a:true,e:"正しい。DCF法を標準とする点が特徴です。"},
{q:"証券化対象不動産の未竣工建物等鑑定評価は、総論第5章の要件に加え、工事中止等の損害が保険等で回避される場合に限り行える。",a:true,e:"正しい。追加要件があります。"},
{q:"処理計画の策定ではエンジニアリング・レポートの有無及び内容の確認が含まれる。",a:true,e:"正しい。確認事項の一つです。"},
{q:"証券化対象不動産の鑑定評価を複数の鑑定士が共同して行う場合、担当部分の責任を負えば足りる。",a:false,e:"誤り。常に業務全体の情報共有が必要で、全鑑定士が一体となって遂行しなければなりません。"},
{q:"証券化対象不動産の鑑定評価書は、依頼者及び利害関係者等が内容を容易に把握・比較できるよう記載方法等を工夫しなければならない。",a:true,e:"正しい。通常よりも高度な説明責任が求められます。"},
{q:"民事再生法に基づく早期売却価格で事例資料が少ないときは、正常価格を求めた上で早期売却に伴う減価を行うことができる。",a:true,e:"正しい。代替的手法として認められています。R6問30(4)参照。"},
{q:"会社更生法に基づく事業継続前提の価格は、事業経営に基づく純収益のうち不動産に帰属する収益価格を標準とする。",a:true,e:"正しい。R6問30(5)参照。"},
{q:"証券化対象不動産とは、資産の流動化に関する法律、投資信託及び投資法人に関する法律等に規定する不動産取引の目的である不動産に限られ、取引の目的となる見込みのある不動産は含まれない。",a:false,e:"誤り。「不動産取引の目的となる見込みのある不動産」も含まれます。"},
{q:"証券化対象不動産の鑑定評価において、不動産鑑定士は依頼者のみならず広範な投資家等に重大な影響を及ぼすことを考慮しなければならない。",a:true,e:"正しい。通常の鑑定評価以上に広範な影響を考慮する必要があります。"},
{q:"証券化対象不動産の鑑定評価において、証券化等が円滑に行われるよう配慮しつつ、鑑定評価に係る資料及び手順等を依頼者に説明し理解を得るものとする。",a:true,e:"正しい。基準に明記されています。"},
{q:"投資法人等が投資対象資産を譲渡するときの鑑定評価で求める価格は特定価格として求めなければならない。",a:false,e:"誤り。譲渡の場合は「正常価格として求めることに留意する必要がある」とされています。"},
{q:"民事再生法に基づく早期売却価格は、早期売却による減価が生じないと判断される特段の事情がない限り特定価格として求めなければならない。",a:true,e:"正しい。通常の市場公開期間より短い期間での売却を前提とするためです。"},
{q:"会社更生法に基づく事業継続前提の価格は、対象不動産の利用現況を所与とすることにより最有効使用と異なる場合には特定価格として求めなければならない。",a:true,e:"正しい。事業の拘束下にある前提の価格です。"},
{q:"証券化対象不動産の個別的要因の調査では、内覧の実施が原則とされており、エンジニアリング・レポートのみに依拠することはできない。",a:true,e:"正しい。各論第3章では実地調査の充実が求められており、内覧の実施が原則です。"},
{q:"証券化対象不動産のDCF法適用においては、毎期の収益費用項目について統一的な分類が求められている。",a:true,e:"正しい。H19改正で収益費用項目の統一が図られました。"},
{q:"証券化対象不動産に係る信託受益権の評価は各論第3章の適用対象に含まれない。",a:false,e:"誤り。「信託受益権に係るものを含む」と明記されています。"},

let curCh=0,qs=[],idx=0,sc=0,wl=[],retry=false;
