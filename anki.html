<script>
const Q={
ch1:[
{cat:"総論第1章",text:"不動産は、通常、【土地】とその【定着物】をいう。土地はその持つ有用性の故にすべての国民の【生活と活動】とに欠くことのできない基盤である。",src:"総論第1章 第1節 I"},
{cat:"総論第1章",text:"この不動産のあり方は、【自然的】、【社会的】、【経済的】及び【行政的】な要因の相互作用によって決定されるとともに【経済価値の本質】を決定づけている。",src:"総論第1章 第1節 I"},
{cat:"総論第1章",text:"不動産の価格は、一般に、(1)その不動産に対してわれわれが認める【効用】、(2)その不動産の【相対的稀少性】、(3)その不動産に対する【有効需要】の三者の相関結合によって生ずる不動産の経済価値を、貨幣額をもって表示したものである。",src:"総論第1章 第1節 II"},
{cat:"総論第1章",text:"土地の自然的特性として、【地理的位置の固定性】、【不動性（非移動性）】、【永続性（不変性）】、【不増性】、【個別性（非同質性、非代替性）】等を有し、固定的であって硬直的である。",src:"総論第1章 第2節 I"},
{cat:"総論第1章",text:"土地の人文的特性として、【用途の多様性】（用途の競合、転換及び併存の可能性）、【併合及び分割の可能性】、【社会的及び経済的位置の可変性】等を有し、可変的であって伸縮的である。",src:"総論第1章 第2節 I"},
{cat:"総論第1章",text:"不動産は、また、その自然的条件及び人文的条件の全部又は一部を共通にすることによって、他の不動産とともにある地域を構成し、その地域の【構成分子】としてその地域との間に、【依存】、【補完】等の関係にたち、その地域内の他の構成分子である不動産との間に【協働】、【代替】、【競争】等の関係にたつ。",src:"総論第1章 第2節 I"},
{cat:"総論第1章",text:"不動産の経済価値は、一般に、交換の対価である【価格】として表示されるとともに、その用益の対価である【賃料】として表示される。そして、この価格と賃料との間には、いわゆる【元本】と【果実】との間に認められる相関関係を認めることができる。",src:"総論第1章 第2節 II"},
{cat:"総論第1章",text:"不動産の価格（又は賃料）は、その不動産に関する【所有権】、【賃借権】等の権利の対価又は経済的利益の対価であり、また、二つ以上の権利利益が同一の不動産の上に存する場合には、それぞれの権利利益について、その価格（又は賃料）が形成され得る。",src:"総論第1章 第2節 II"},
{cat:"総論第1章",text:"不動産の価格（又は賃料）は、通常、【過去】と【将来】とにわたる長期的な考慮の下に形成される。今日の価格（又は賃料）は、昨日の展開であり、明日を反映するものであって常に変化の過程にあるものである。",src:"総論第1章 第2節 II"},
{cat:"総論第1章",text:"不動産の鑑定評価は、その対象である不動産の経済価値を判定し、これを【貨幣額】をもって表示することである。",src:"総論第1章 第3節"},
{cat:"総論第1章",text:"この判断の当否は、これら各段階のそれぞれについての不動産鑑定士の【能力の如何】及びその能力の行使の【誠実さ】の如何に係るものであり、また、必要な関連諸資料の【収集整理の適否】及びこれらの諸資料の【分析解釈の練達の程度】に依存するものである。",src:"総論第1章 第3節"},
{cat:"総論第1章",text:"鑑定評価は、高度な【知識】と豊富な【経験】及び的確な【判断力】を持ち、さらに、これらが【有機的】かつ【総合的】に発揮できる練達堪能な専門家によってなされるとき、初めて合理的であって、客観的に論証できるものとなる。",src:"総論第1章 第3節"},
{cat:"総論第1章",text:"不動産の鑑定評価とは、不動産の価格に関する専門家の【判断】であり、【意見】であるといってよいであろう。",src:"総論第1章 第3節"},
{cat:"総論第1章",text:"不動産鑑定士は、同法に規定されているとおり、【良心】に従い、誠実に不動産の鑑定評価を行い、専門職業家としての【社会的信用】を傷つけるような行為をしてはならない。",src:"総論第1章 第4節"},
{cat:"総論第1章",text:"不動産鑑定士は、正当な理由がなくて、その職務上取り扱ったことについて知り得た【秘密】を他に漏らしてはならない。",src:"総論第1章 第4節"},
{cat:"総論第1章",text:"不動産鑑定士は、依頼者に対して鑑定評価の結果を分かり易く【誠実に説明】を行い得るようにするとともに、社会一般に対して、実践活動をもって、不動産の鑑定評価に対する【信頼を高める】よう努めなければならない。",src:"総論第1章 第4節 (2)"},
{cat:"総論第1章",text:"不動産鑑定士は、不動産の鑑定評価に当たっては、自己又は関係人の利害の有無その他いかなる理由にかかわらず、【公平妥当な態度】を保持しなければならない。",src:"総論第1章 第4節 (3)"},
{cat:"総論第1章",text:"自己の能力の限度を超えていると思われる不動産の鑑定評価を引き受け、又は縁故若しくは特別の利害関係を有する場合等、公平な鑑定評価を害する恐れのあるときは、【原則として】不動産の鑑定評価を引き受けてはならない。",src:"総論第1章 第4節 (5)"},
{cat:"総論第1章",text:"不動産の現実の取引価格等は、取引等の必要に応じて個別的に形成されるのが通常であり、しかもそれは個別的な事情に左右されがちのものであって、このような取引価格等から不動産の適正な価格を見出すことは【一般の人には非常に困難】である。",src:"総論第1章 第2節 II (4)"},
{cat:"総論第1章",text:"不動産の属する地域は固定的なものではなくて、常に【拡大縮小】、【集中拡散】、【発展衰退】等の変化の過程にあるものであるから、不動産の利用形態が最適なものであるかどうか、常に検討されなければならない。",src:"総論第1章 第2節 II (3)"},
{cat:"総論第1章",text:"不動産鑑定士は、不断の勉強と研鑽とによって高度な知識と豊富な経験と的確な判断力とが有機的に統一されることで体得し、【鑑定評価の進歩改善】に努力しなければならない。",src:"総論第1章 第4節 (1)"},
{cat:"総論第1章",text:"土地は、【土地基本法】に定める土地についての基本理念に即して利用及び取引が行われるべきであり、特に【投機的取引】の対象とされてはならないものである。不動産鑑定士は、このような土地についての基本的な認識に立って不動産の鑑定評価を行わなければならない。",src:"総論第1章 第4節"},
{cat:"総論第1章",text:"不動産の鑑定評価は、この社会における一連の価格秩序のなかで、対象不動産の価格の占める適正なあり所を指摘することであるから、その【社会的公共的意義】は極めて大きいといわなければならない。",src:"総論第1章 第3節"},
{cat:"総論第1章",text:"不動産鑑定士は、不動産の鑑定評価の社会的公共的意義を理解し、その【責務】を自覚し、【的確かつ誠実】な鑑定評価活動の実践をもって、社会一般の信頼と期待に報いなければならない。",src:"総論第1章 第4節"},
{cat:"総論第1章",text:"不動産の鑑定評価に当たっては、【専門職業家としての注意】を払わなければならないこと。",src:"総論第1章 第4節 (4)"},
{cat:"総論第1章",text:"不動産の価格とこれらの要因との関係は、不動産の価格が、これらの要因の影響の下にあると同時に【選択指標】としてこれらの要因に影響を与えるという【二面性】を持つものである。",src:"総論第1章 第1節 II"},
{cat:"総論第1章",text:"不動産は、この土地の持つ諸特性に照応する特定の自然的条件及び人文的条件を与件として利用され、その社会的及び経済的な有用性を発揮するものである。そして、これらの諸条件の変化に伴って、その【利用形態】並びにその社会的及び経済的な【有用性】は変化する。",src:"総論第1章 第2節 I"},
{cat:"総論第1章",text:"不動産は、他の地域との間に【相互関係】にたち、この相互関係を通じて、その【社会的及び経済的位置】を占めるものである。",src:"総論第1章 第2節 I"},
{cat:"総論第1章",text:"土地と我々人間が各般の目的のためにどのように利用しているかという土地と人間との関係は、不動産のあり方、すなわち、不動産がどのように【構成】され、どのように【貢献】しているかということに具体的に現れる。",src:"総論第1章 第1節 I"},
{cat:"総論第1章",text:"不動産の鑑定評価を行うに当たっては、鑑定評価の対象となる不動産の的確な認識の上に、必要とする関連資料を十分に収集・整理し、不動産の価格を形成する【要因】及び不動産の価格に関する【諸原則】についての十分な理解のもとに、鑑定評価の【手法】を駆使して、対象不動産の経済価値に関する最終判断に到達するものである。",src:"総論第1章 第3節"},
],
ch2:[
{cat:"総論第2章",text:"不動産の【種別】とは、不動産の【用途】に関して区分される不動産の分類をいう。",src:"総論第2章"},
{cat:"総論第2章",text:"不動産の【類型】とは、その【有形的利用】及び【権利関係】の態様に応じて区分される不動産の分類をいう。",src:"総論第2章"},
{cat:"総論第2章",text:"不動産の種別及び類型が不動産の経済価値を本質的に決定づけるものであるから、この【両面】の分析をまって初めて精度の高い不動産の鑑定評価が可能となるものである。",src:"総論第2章"},
{cat:"総論第2章",text:"地域の種別は、【宅地地域】、【農地地域】、【林地地域】等に分けられる。",src:"総論第2章 第1節 I"},
{cat:"総論第2章",text:"【宅地地域】とは、居住、商業活動、工業生産活動等の用に供される建物、構築物等の敷地の用に供されることが、自然的、社会的、経済的及び行政的観点からみて合理的と判断される地域をいい、【住宅地域】、【商業地域】、【工業地域】等に細分される。",src:"総論第2章 第1節 I"},
{cat:"総論第2章",text:"【農地地域】とは、農業生産活動のうち【耕作】の用に供されることが、自然的、社会的、経済的及び行政的観点からみて合理的と判断される地域をいう。",src:"総論第2章 第1節 I"},
{cat:"総論第2章",text:"【林地地域】とは、林業生産活動のうち【木竹又は特用林産物】の生育の用に供されることが、自然的、社会的、経済的及び行政的観点からみて合理的と判断される地域をいう。",src:"総論第2章 第1節 I"},
{cat:"総論第2章",text:"【見込地】とは、宅地地域、農地地域、林地地域等の相互間において、ある種別の地域から他の種別の地域へと【転換】しつつある地域のうちにある土地をいい、宅地見込地、農地見込地等に分けられる。",src:"総論第2章 第1節 II"},
{cat:"総論第2章",text:"【移行地】とは、宅地地域、農地地域等のうちにあって、細分されたある種別の地域から他の種別の地域へと【移行】しつつある地域のうちにある土地をいう。",src:"総論第2章 第1節 II"},
{cat:"総論第2章",text:"宅地の類型は、その有形的利用及び権利関係の態様に応じて、【更地】、【建付地】、【借地権】、【底地】、【区分地上権】等に分けられる。",src:"総論第2章 第2節 I"},
{cat:"総論第2章",text:"【更地】とは、建物等の定着物がなく、かつ、使用収益を制約する【権利の付着していない】宅地をいう。",src:"総論第2章 第2節 I"},
{cat:"総論第2章",text:"【建付地】とは、建物等の用に供されている敷地で建物等及びその敷地が【同一の所有者】に属している宅地をいう。",src:"総論第2章 第2節 I"},
{cat:"総論第2章",text:"【借地権】とは、借地借家法（廃止前の借地法を含む。）に基づく借地権（建物の所有を目的とする【地上権】又は土地の【賃借権】）をいう。",src:"総論第2章 第2節 I"},
{cat:"総論第2章",text:"【底地】とは、宅地について【借地権】の付着している場合における当該宅地の【所有権】をいう。",src:"総論第2章 第2節 I"},
{cat:"総論第2章",text:"【区分地上権】とは、工作物を所有するため、【地下又は空間】に上下の範囲を定めて設定された地上権をいう。",src:"総論第2章 第2節 I"},
{cat:"総論第2章",text:"建物及びその敷地の類型は、その有形的利用及び権利関係の態様に応じて、【自用の建物及びその敷地】、【貸家及びその敷地】、【借地権付建物】、【区分所有建物及びその敷地】等に分けられる。",src:"総論第2章 第2節 II"},
{cat:"総論第2章",text:"【自用の建物及びその敷地】とは、建物所有者とその敷地の所有者とが同一人であり、その所有者による使用収益を制約する権利の付着していない場合における当該建物及びその敷地をいう。",src:"総論第2章 第2節 II"},
{cat:"総論第2章",text:"【貸家及びその敷地】とは、建物所有者とその敷地の所有者とが同一人であるが、建物が【賃貸借】に供されている場合における当該建物及びその敷地をいう。",src:"総論第2章 第2節 II"},
{cat:"総論第2章",text:"【借地権付建物】とは、借地権を権原とする建物が存する場合における当該建物及び【借地権】をいう。",src:"総論第2章 第2節 II"},
{cat:"総論第2章",text:"【区分所有建物及びその敷地】とは、建物の区分所有等に関する法律第２条第３項に規定する【専有部分】並びに当該専有部分に係る同条第４項に規定する【共用部分】の共有持分及び同条第６項に規定する【敷地利用権】をいう。",src:"総論第2章 第2節 II"},
{cat:"総論第2章",text:"宅地とは、宅地地域のうちにある土地をいい、【住宅地】、【商業地】、【工業地】等に細分される。",src:"総論第2章 第1節 II"},
{cat:"総論第2章",text:"不動産の種類とは、不動産の【種別】及び【類型】の二面から成る複合的な不動産の概念を示すものであり、この両面の分析をまって初めて精度の高い不動産の鑑定評価が可能となるものである。",src:"総論第2章"},
{cat:"総論第2章",text:"高度商業地域は、例えば、大都市の都心又は副都心にあって、広域的商圏を有し、比較的【大規模な中高層】の店舗、事務所等が高度に集積している地域である。さらに、一般高度商業地域、【業務高度商業地域】、複合高度商業地域に細分される。",src:"総論第2章 第1節 I (留意事項) (2) ①"},
{cat:"総論第2章",text:"住宅地域の細分として、敷地が広く、街区及び画地が整然とし、植生と眺望、景観等が優れ、建築の施工の質の高い建物が連たんし、【良好な近隣環境】を形成する等居住環境の極めて良好な地域であり、従来から名声の高い住宅地域が【①】にあたる。",src:"総論第2章 第1節 I (留意事項) (1)"},
{cat:"総論第2章",text:"住宅地域の細分として、比較的狭小な戸建住宅及び共同住宅が密集する住宅地域又は住宅を主として店舗、事務所、小工場等が【混在】する住宅地域が【③】にあたる。",src:"総論第2章 第1節 I (留意事項) (1)"},
{cat:"総論第2章",text:"農地とは、【農地地域】のうちにある土地をいう。林地とは、【林地地域】のうちにある土地（立木竹を除く。）をいう。",src:"総論第2章 第1節 II"},
{cat:"総論第2章",text:"【見込地】とは、宅地地域、農地地域、林地地域等の相互間において、ある種別の地域から他の種別の地域へと転換しつつある地域のうちにある土地をいい、宅地見込地、農地見込地等に分けられる。【移行地】とは、細分されたある種別の地域から他の種別の地域へと移行しつつある地域のうちにある土地をいう。",src:"総論第2章 第1節 II"},
{cat:"総論第2章",text:"不動産の鑑定評価においては、不動産の【地域性】並びに【有形的利用】及び【権利関係】の態様に応じた分析を行う必要があり、その地域の特性等に基づく不動産の種類ごとに検討することが重要である。",src:"総論第2章"},
{cat:"総論第2章",text:"宅地地域は、さらに住宅地域、商業地域、工業地域等については、その【規模】、【構成の内容】、【機能】等に応じた細分化が考えられる。",src:"総論第2章 第1節 I"},
{cat:"総論第2章",text:"【郊外路線商業地域】とは、都市の郊外の幹線道路沿いにおいて、店舗、営業所等が連たんしている地域をいい、【近隣商業地域】とは、主として近隣の居住者に対する日用品等の販売を行う店舗等が連たんしている地域をいう。",src:"総論第2章 第1節 I (留意事項) (2)"},
],
ch3:[
{cat:"総論第3章",text:"【価格形成要因】とは、不動産の【効用】及び【相対的稀少性】並びに不動産に対する【有効需要】の三者に影響を与える要因をいう。",src:"総論第3章"},
{cat:"総論第3章",text:"価格形成要因は、【一般的要因】、【地域要因】及び【個別的要因】に分けられる。",src:"総論第3章"},
{cat:"総論第3章",text:"不動産の鑑定評価を行うに当たっては、価格形成要因を【市場参加者】の観点から明確に把握し、かつ、その推移及び動向並びに諸要因間の【相互関係】を十分に分析して、前記三者に及ぼすその影響を判定することが必要である。",src:"総論第3章"},
{cat:"総論第3章",text:"【一般的要因】とは、一般経済社会における不動産のあり方及びその価格の水準に影響を与える要因をいう。それは、【自然的要因】、【社会的要因】、【経済的要因】及び【行政的要因】に大別される。",src:"総論第3章 第1節"},
{cat:"総論第3章",text:"【地域要因】とは、一般的要因の相関結合によって規模、構成の内容、機能等にわたる各地域の特性を形成し、その地域に属する不動産の価格の形成に【全般的な影響】を与える要因をいう。",src:"総論第3章 第2節"},
{cat:"総論第3章",text:"【個別的要因】とは、不動産に【個別性】を生じさせ、その価格を【個別的に形成】する要因をいう。",src:"総論第3章 第3節"},
{cat:"総論第3章",text:"行政的要因の主なものとして、(1)土地利用に関する【計画及び規制】の状態、(2)土地及び建物の構造、防災等に関する規制の状態、(3)宅地及び住宅に関する施策の状態、(4)不動産に関する【税制】の状態、(5)不動産の【取引に関する規制】の状態がある。",src:"総論第3章 第1節 IV"},
{cat:"総論第3章",text:"社会的要因の主なものとして、人口の状態、家族構成及び世帯分離の状態、都市形成及び【公共施設】の整備の状態、不動産の取引及び【使用収益の慣行】、【情報化】の進展の状態、【生活様式】等の状態がある。",src:"総論第3章 第1節 II"},
{cat:"総論第3章",text:"経済的要因の主なものとして、貯蓄、消費、投資及び【国際収支】の状態、【財政】及び金融の状態、物価、賃金、雇用及び企業活動の状態、【税負担】の状態、技術革新及び【産業構造】の状態、【国際化】の状態がある。",src:"総論第3章 第1節 III"},
{cat:"総論第3章",text:"自然的要因の主なものとして、地質、地盤等の状態、土壌及び土層の状態、地勢の状態、【地理的位置関係】、【気象】の状態がある。",src:"総論第3章 第1節 I"},
{cat:"総論第3章",text:"転換し、又は移行しつつある地域については、転換し、又は移行すると見込まれる転換後又は移行後の種別の地域の地域要因を【より重視】すべきであるが、転換又は移行の程度の低い場合においては、転換前又は移行前の種別の地域の地域要因をより重視すべきである。",src:"総論第3章 第2節（留意事項）"},
{cat:"総論第3章",text:"見込地及び移行地については、転換し、又は移行すると見込まれる転換後又は移行後の種別の地域内の土地の【個別的要因】をより重視すべきであるが、転換又は移行の程度の低い場合においては、転換前又は移行前の種別の地域内の土地の個別的要因をより重視すべきである。",src:"総論第3章 第3節 I 4"},
{cat:"総論第3章",text:"建物に関する個別的要因の各用途に共通するものとして、建築（新築、増改築等又は移転）の年次、面積、高さ、構造、材質等、設計、設備等の機能性、施工の質と量、【耐震性】、【耐火性】等建物の性能、【維持管理】の状態、【有害な物質の使用の有無及びその状態】がある。",src:"総論第3章 第3節 II"},
{cat:"総論第3章",text:"なお、市場参加者が取引等に際して着目するであろう個別的要因が、建物の【用途毎】に異なることに留意する必要がある。",src:"総論第3章 第3節 II"},
{cat:"総論第3章",text:"賃貸用不動産に関する個別的要因には、【賃貸経営管理の良否】があり、その主なものとして、賃借人の状況及び賃貸借契約の内容、貸室の稼働状況、躯体・設備・内装等の資産区分及び修繕費用等の負担区分がある。",src:"総論第3章 第3節 III"},
{cat:"総論第3章",text:"住宅地の地域要因の主なものとして、(1)日照、温度、湿度、風向等の気象の状態、(2)街路の幅員・構造等の状態、(3)都心との距離及び【交通施設】の状態、(4)商業施設の配置の状態、(5)上下水道・ガス等の【供給・処理施設】の状態、(9)洪水・地すべり等の【災害の発生の危険性】、(13)眺望・景観等の自然的環境の良否、(14)土地利用に関する【計画及び規制】の状態がある。",src:"総論第3章 第2節 I 1"},
{cat:"総論第3章",text:"商業地域特有の地域要因の主なものとして、(1)商業施設又は業務施設の種類・規模・【集積度】等の状態、(2)商業背後地及び顧客の【質と量】、(3)顧客及び従業員の交通手段の状態、(8)【繁華性の程度】及び盛衰の動向、(9)駐車施設の整備の状態がある。",src:"総論第3章 第2節 I 2"},
{cat:"総論第3章",text:"工業地域特有の地域要因の主なものとして、(1)幹線道路・鉄道・港湾・空港等の【輸送施設】の整備の状況、(2)【労働力確保】の難易、(3)製品販売市場及び原材料仕入市場との位置関係、(4)動力資源及び用排水に関する費用がある。",src:"総論第3章 第2節 I 3"},
{cat:"総論第3章",text:"農地地域の地域要因の主なものとして、土壌及び土層の状態、水利及び水質の状態、【洪水・地すべり】等の災害の発生の危険性、道路等の整備の状態、集落との位置関係、消費地との距離及び【輸送施設】の状態がある。",src:"総論第3章 第2節 II"},
{cat:"総論第3章",text:"林地地域の地域要因の主なものとして、日照・温度・湿度・風雨等の気象の状態、【標高・地勢】等の状態、土壌及び土層の状態、【林道】等の整備の状態、労働力確保の難易がある。",src:"総論第3章 第2節 III"},
{cat:"総論第3章",text:"住宅地の個別的要因の主なものとして、⑭【埋蔵文化財】及び地下埋設物の有無並びにその状態、⑮【土壌汚染】の有無及びその状態、⑯【公法上及び私法上】の規制、制約等がある。",src:"総論第3章 第3節 I 1 (1)"},
{cat:"総論第3章",text:"商業地の個別的要因の主なものとして、⑥【商業地域の中心】への接近性、⑦主要交通機関との接近性、⑧【顧客の流動の状態】との適合性がある（住宅地の⑨公共施設・公益的施設等との接近の程度、⑩汚水処理場等の嫌悪施設等との接近の程度は含まれない）。",src:"総論第3章 第3節 I 1 (2)"},
{cat:"総論第3章",text:"工業地の個別的要因の主なものとして、⑥従業員の通勤等のための主要交通機関との接近性、⑦【幹線道路・鉄道・港湾・空港】等の輸送施設との位置関係、⑧電力等の動力資源の状態及び引込の難易がある。",src:"総論第3章 第3節 I 1 (3)"},
{cat:"総論第3章",text:"農地の個別的要因の主なものとして、日照・乾湿・雨量等の状態、土壌及び土層の状態、農道の状態、【灌漑排水】の状態、耕うんの難易、集落との接近の程度、集荷地との接近の程度、【災害の危険性】の程度がある。",src:"総論第3章 第3節 I 2"},
{cat:"総論第3章",text:"建物及びその敷地に関する個別的要因のうち、敷地内における建物・駐車場・通路・庭等の配置、建物と敷地の【規模の対応関係】等建物等と敷地との【適応の状態】、修繕計画・管理計画の良否とその実施の状態がある。",src:"総論第3章 第3節 III"},
],
ch4:[
{cat:"総論第4章",text:"不動産の価格は、不動産の効用及び相対的稀少性並びに不動産に対する有効需要に影響を与える諸要因の相互作用によって形成されるが、その形成の過程を考察するとき、そこに基本的な【法則性】を認めることができる。",src:"総論第4章"},
{cat:"総論第4章",text:"これらの原則は、一般の経済法則に基礎を置くものであるが、孤立しているものではなく、直接的又は間接的に【相互に関連】しているものであることに留意しなければならない。",src:"総論第4章"},
{cat:"総論第4章",text:"【需要と供給の原則】：不動産の価格もまたその需要と供給との相互関係によって定まるのであるが、不動産は他の財と異なる【自然的特性】及び【人文的特性】を有するために、その需要と供給及び価格の形成には、これらの特性の反映が認められる。",src:"総論第4章 I"},
{cat:"総論第4章",text:"【変動の原則】：価格形成要因が常に【変動の過程】にあることを認識して、各要因間の相互因果関係を【動的に】把握すべきである。",src:"総論第4章 II"},
{cat:"総論第4章",text:"【代替の原則】：不動産の価格も【代替可能な他の不動産又は財】の価格と相互に関連して形成される。",src:"総論第4章 III"},
{cat:"総論第4章",text:"【最有効使用の原則】：不動産の価格は、その不動産の効用が【最高度】に発揮される可能性に最も富む使用（最有効使用）を前提として把握される価格を【標準】として形成される。",src:"総論第4章 IV"},
{cat:"総論第4章",text:"最有効使用は、現実の社会経済情勢の下で【客観的】にみて、【良識】と【通常の使用能力】を持つ人による合理的かつ【合法的】な最高最善の使用方法に基づくものである。",src:"総論第4章 IV"},
{cat:"総論第4章",text:"ある不動産についての現実の使用方法は、必ずしも最有効使用に基づいているものではなく、不合理な又は個人的な事情による使用方法のために、当該不動産が十分な効用を発揮していない場合があることに留意すべきである。",src:"総論第4章 IV"},
{cat:"総論第4章",text:"【均衡の原則】：不動産の収益性又は快適性が最高度に発揮されるためには、その【構成要素の組合せ】が均衡を得ていることが必要である。",src:"総論第4章 V"},
{cat:"総論第4章",text:"【収益逓増及び逓減の原則】：増加させる単位投資額に対応する収益は、ある点までは【増加】するが、その後は【減少】する。",src:"総論第4章 VI"},
{cat:"総論第4章",text:"【収益配分の原則】：土地、資本、労働及び経営（組織）の各要素の結合によって生ずる総収益のうち、資本、労働及び経営（組織）に配分される部分以外の部分は、それぞれの配分が正しく行われる限り、【土地】に帰属するものである。",src:"総論第4章 VII"},
{cat:"総論第4章",text:"【寄与の原則】：不動産のある部分がその不動産全体の【収益獲得】に寄与する度合いは、その不動産全体の価格に影響を及ぼす。",src:"総論第4章 VIII"},
{cat:"総論第4章",text:"【適合の原則】：不動産の収益性又は快適性が最高度に発揮されるためには、当該不動産がその【環境】に適合していることが必要である。",src:"総論第4章 IX"},
{cat:"総論第4章",text:"【競争の原則】：一般に、超過利潤は【競争】を惹起し、競争は超過利潤を【減少】させ、終局的にはこれを【消滅】させる傾向を持つ。",src:"総論第4章 X"},
{cat:"総論第4章",text:"【予測の原則】：不動産の価格も、価格形成要因の変動についての【市場参加者】による予測によって左右される。",src:"総論第4章 XI"},
{cat:"総論第4章",text:"不動産の鑑定評価は、その不動産の価格の形成過程を追究し、分析することを本質とするものであるから、不動産の経済価値に関する適切な最終判断に到達するためには、鑑定評価に必要な指針としてこれらの法則性を認識し、かつ、これらを具体的に現した諸原則を【活用】すべきである。",src:"総論第4章"},
{cat:"総論第4章",text:"【均衡の原則】：不動産の最有効使用を判定するためには、その構成要素の組合せが【均衡】を得ているかどうかを分析することが必要である。",src:"総論第4章 V"},
{cat:"総論第4章",text:"【収益逓増及び逓減の原則】：ある単位投資額を継続的に増加させると、これに伴って総収益は増加する。しかし、増加させる単位投資額に対応する収益は、ある点までは増加するが、その後は減少する。この原則は、不動産に対する【追加投資】の場合についても同様である。",src:"総論第4章 VI"},
{cat:"総論第4章",text:"【寄与の原則】：この原則は、不動産の最有効使用の判定に当たっての不動産の【追加投資の適否】の判定等に有用である。",src:"総論第4章 VIII"},
{cat:"総論第4章",text:"【適合の原則】：不動産の最有効使用を判定するためには、当該不動産が【環境】に適合しているかどうかを分析することが必要である。",src:"総論第4章 IX"},
{cat:"総論第4章",text:"【競争の原則】：不動産についても、その利用による超過利潤を求めて、不動産相互間及び他の財との間において【競争関係】が認められ、したがって、不動産の価格は、このような競争の過程において形成される。",src:"総論第4章 X"},
{cat:"総論第4章",text:"【変動の原則】：特に、不動産の【最有効使用】を判定するためには、この変動の過程を分析することが必要である。",src:"総論第4章 II"},
{cat:"総論第4章",text:"不動産の鑑定評価においては、価格形成要因が常に【変動の過程】にあることを認識して、各要因間の相互因果関係を【動的】に把握すべきである。",src:"総論第4章 II"},
{cat:"総論第4章",text:"【収益配分の原則】：土地、資本、労働及び経営（組織）の各要素の結合によって生ずる総収益のうち、資本・労働・経営（組織）に配分される部分以外は、それぞれの配分が正しく行われる限り、【土地】に帰属するものである。この原則から、土地の価格は一種の【残余】であることが導かれる。",src:"総論第4章 VII"},
],
ch5:[
{cat:"総論第5章",text:"不動産の鑑定評価に当たっては、基本的事項として、【対象不動産】、【価格時点】及び【価格又は賃料の種類】を確定しなければならない。",src:"総論第5章"},
{cat:"総論第5章",text:"対象不動産の確定は、鑑定評価の対象を明確に他の不動産と区別し、特定することであり、それは不動産鑑定士が鑑定評価の【依頼目的及び条件】に照応する対象不動産と当該不動産の【現実の利用状況】とを照合して確認するという実践行為を経て最終的に確定されるべきものである。",src:"総論第5章 第1節 I"},
{cat:"総論第5章",text:"条件の設定は、依頼目的に応じて対象不動産の内容を確定し（【対象確定条件】）、設定する地域要因若しくは個別的要因についての【想定上の条件】を明確にし、又は不動産鑑定士の通常の調査では事実の確認が困難な特定の価格形成要因について調査の範囲を明確にするもの（【調査範囲等条件】）である。",src:"総論第5章 第1節 留意事項 (1)"},
{cat:"総論第5章",text:"対象確定条件を設定するに当たっては、鑑定評価書の【利用者の利益】を害するおそれがないかどうかの観点から当該条件設定の【妥当性】を確認しなければならない。",src:"総論第5章 第1節 II 2"},
{cat:"総論第5章",text:"想定上の条件は、鑑定評価書の利用者の利益を害するおそれがないかどうかの観点に加え、特に【実現性】及び【合法性】の観点から妥当なものでなければならない。",src:"総論第5章 第1節 III"},
{cat:"総論第5章",text:"【実現性】とは、設定された想定上の条件を実現するための行為を行う者の事業遂行能力等を勘案した上で当該条件が実現する【確実性】が認められることをいう。",src:"総論第5章 第1節 留意事項 II イ"},
{cat:"総論第5章",text:"【合法性】とは、【公法上】及び【私法上】の諸規制に反しないことをいう。",src:"総論第5章 第1節 留意事項 II ウ"},
{cat:"総論第5章",text:"不動産鑑定士の通常の調査の範囲では、対象不動産の価格への影響の程度を判断するための事実の確認が困難な特定の価格形成要因が存する場合、当該価格形成要因について調査の範囲に係る条件（【調査範囲等条件】）を設定することができる。",src:"総論第5章 第1節 IV"},
{cat:"総論第5章",text:"価格形成要因は、時の経過により変動するものであるから、不動産の価格はその判定の基準となった日においてのみ妥当するものである。したがって、不動産の鑑定評価を行うに当たっては、不動産の価格の判定の基準日を確定する必要があり、この日を【価格時点】という。",src:"総論第5章 第2節"},
{cat:"総論第5章",text:"賃料の価格時点は、賃料の算定の期間の収益性を反映するものとしてその期間の【期首】となる。",src:"総論第5章 第2節"},
{cat:"総論第5章",text:"価格時点は、鑑定評価を行った年月日を基準として【現在時点】、【過去時点】及び【将来時点】に分けられる。",src:"総論第5章 第2節"},
{cat:"総論第5章",text:"【正常価格】とは、市場性を有する不動産について、現実の社会経済情勢の下で合理的と考えられる条件を満たす市場で形成されるであろう【市場価値】を表示する適正な価格をいう。",src:"総論第5章 第3節 I 1"},
{cat:"総論第5章",text:"正常価格の市場の条件の一つとして、市場参加者が【自由意思】に基づいて市場に参加し、参入、退出が自由であること。なお、市場参加者は、売り急ぎ、買い進み等をもたらす【特別な動機】のないこと。",src:"総論第5章 第3節 I 1 (1)"},
{cat:"総論第5章",text:"正常価格の市場の条件の一つとして、対象不動産が【相当の期間】市場に公開されていること。【相当の期間】とは、対象不動産の取得に際し必要となる情報が公開され、【需要者層】に十分浸透するまでの期間をいう。",src:"総論第5章 第3節 I 1 (3)・留意事項"},
{cat:"総論第5章",text:"買主が通常の資金調達能力を有していることとは、買主が対象不動産の取得に当たって、市場における標準的な【借入条件】（借入比率、金利、借入期間等）の下での【借り入れ】と【自己資金】とによって資金調達を行うことができる能力をいう。",src:"総論第5章 第3節 留意事項 ①"},
{cat:"総論第5章",text:"【限定価格】とは、市場性を有する不動産について、不動産と取得する他の不動産との【併合】又は不動産の一部を取得する際の【分割】等に基づき正常価格と同一の市場概念の下において形成されるであろう市場価値と乖離することにより、市場が相対的に限定される場合における取得部分の当該市場限定に基づく市場価値を適正に表示する価格をいう。",src:"総論第5章 第3節 I 2"},
{cat:"総論第5章",text:"【特定価格】とは、市場性を有する不動産について、【法令等】による社会的要請を背景とする鑑定評価目的の下で、正常価格の前提となる諸条件を満たさないことにより正常価格と同一の市場概念の下において形成されるであろう市場価値と乖離することとなる場合における不動産の経済価値を適正に表示する価格をいう。",src:"総論第5章 第3節 I 3"},
{cat:"総論第5章",text:"【特殊価格】とは、【文化財】等の一般的に市場性を有しない不動産について、その利用現況等を前提とした不動産の経済価値を適正に表示する価格をいう。",src:"総論第5章 第3節 I 4"},
{cat:"総論第5章",text:"【正常賃料】とは、正常価格と同一の市場概念の下において新たな賃貸借等の契約において成立するであろう経済価値を表示する適正な賃料（【新規賃料】）をいう。",src:"総論第5章 第3節 II 1"},
{cat:"総論第5章",text:"【限定賃料】とは、限定価格と同一の市場概念の下において新たな賃貸借等の契約において成立するであろう経済価値を適正に表示する賃料（【新規賃料】）をいう。",src:"総論第5章 第3節 II 2"},
{cat:"総論第5章",text:"【継続賃料】とは、不動産の賃貸借等の継続に係る【特定の当事者間】において成立するであろう経済価値を適正に表示する賃料をいう。",src:"総論第5章 第3節 II 3"},
{cat:"総論第5章",text:"【未竣工建物等鑑定評価】とは、造成に関する工事が完了していない土地又は建築に係る工事が完了していない建物について、当該工事の完了を前提として鑑定評価の対象とすることをいう。",src:"総論第5章 第1節 II 1 (5)"},
{cat:"総論第5章",text:"条件設定は、鑑定評価の妥当する範囲及び鑑定評価を行った不動産鑑定士の【責任の範囲】を示すという意義を持つものである。",src:"総論第5章 第1節 留意事項 (1)"},
{cat:"総論第5章",text:"対象確定条件には、(1)現状を所与として対象とすること、(2)【独立鑑定評価】（更地として対象とすること）、(3)【部分鑑定評価】（構成部分を対象とすること）、(4)【併合鑑定評価又は分割鑑定評価】、(5)未竣工建物等鑑定評価の5種類がある。",src:"総論第5章 第1節 II 1"},
{cat:"総論第5章",text:"未竣工建物等鑑定評価を行う場合は、価格時点において想定される竣工後の不動産に係る物的確認を行うために必要な【設計図書等】及び権利の態様の確認を行うための【請負契約書等】を収集しなければならない。",src:"総論第5章 第1節 II 2"},
{cat:"総論第5章",text:"証券化対象不動産の鑑定評価及び会社法上の現物出資の目的となる不動産の鑑定評価等、鑑定評価が鑑定評価書の利用者の利益に【重大な影響】を及ぼす可能性がある場合には、原則として、現実の利用状況と異なる対象確定条件、想定上の条件及び調査範囲等条件の設定をしてはならない。",src:"総論第5章 第1節 V"},
{cat:"総論第5章",text:"条件設定をする場合、依頼者との間で当該条件設定に係る鑑定評価依頼契約上の【合意】がなくてはならない。条件設定が妥当ではないと認められる場合には、依頼者に説明の上、【妥当な条件に改定】しなければならない。",src:"総論第5章 第1節 VI"},
{cat:"総論第5章",text:"過去時点の鑑定評価は、対象不動産の確認等が可能であり、かつ、鑑定評価に必要な要因資料及び事例資料の収集が可能な場合に限り行うことができる。将来時点の鑑定評価は、原則として行うべきではないが、特に必要がある場合において鑑定評価上妥当性を欠くことがないと認められるときは将来の【価格時点】を設定することができる。",src:"総論第5章 第2節 留意事項 (2)(3)"},
{cat:"総論第5章",text:"正常価格の市場参加者は、①売り急ぎ・買い進み等をもたらす【特別な動機】のないこと、②対象不動産及び市場について取引を成立させるために必要な通常の【知識や情報】を得ていること、③取引を成立させるために通常必要と認められる【労力・費用】を費やしていること、④対象不動産の【最有効使用】を前提とした価値判断を行うこと、⑤買主が通常の【資金調達能力】を有していること、を要件とする。",src:"総論第5章 第3節 I 1 (1)"},
{cat:"総論第5章",text:"【特定価格】を求めなければならない場合として、①民事再生法に基づき早期売却を前提とした価格を求める場合、②投資信託及び投資法人に関する法律に基づく【投資採算価値】を求める場合、③会社更生法又は民事再生法の規定による鑑定評価目的の下で【事業継続を前提】とした価格を求める場合がある。",src:"総論第5章 第3節 I 3"},
{cat:"総論第5章",text:"【特殊価格】は、文化財等の一般的に市場性を有しない不動産について求めるものであり、その代表例として【文化財の指定】を受けた建造物等の鑑定評価があげられる。",src:"総論第5章 第3節 I 4"},
],
ch6:[
{cat:"総論第6章",text:"【地域分析】とは、その対象不動産がどのような地域に存するか、その地域はどのような特性を有するか、また、対象不動産に係る市場はどのような特性を有するか、及びそれらの特性はその地域内の不動産の利用形態と価格形成について全般的にどのような影響力を持っているかを分析し、判定することをいう。",src:"総論第6章 第1節 I"},
{cat:"総論第6章",text:"地域分析に当たって特に重要な地域は、【用途的地域】（近隣地域及びその類似地域）と、近隣地域及びこれと相関関係にある類似地域を含むより広域的な地域、すなわち【同一需給圏】である。",src:"総論第6章 第1節 I"},
{cat:"総論第6章",text:"近隣地域の特性は、通常、その地域に属する不動産の一般的な【標準的使用】に具体的に現れるが、この標準的使用は、利用形態からみた地域相互間の相対的位置関係及び価格形成を明らかにする手掛りとなる。",src:"総論第6章 第1節 I"},
{cat:"総論第6章",text:"【近隣地域】とは、対象不動産の属する用途的地域であって、より大きな規模と内容とを持つ地域である都市あるいは農村等の内部にあって、居住、商業活動、工業生産活動等人の生活と活動とに関して、ある特定の用途に供されることを中心として【地域的にまとまり】を示している地域をいう。",src:"総論第6章 第1節 II (1) ①"},
{cat:"総論第6章",text:"【類似地域】とは、近隣地域の地域の特性と【類似する特性】を有する地域であり、その地域に属する不動産は、特定の用途に供されることを中心として地域的にまとまりを持つものである。",src:"総論第6章 第1節 II (1) ②"},
{cat:"総論第6章",text:"【同一需給圏】とは、一般に対象不動産と【代替関係】が成立して、その価格の形成について相互に影響を及ぼすような関係にある他の不動産の存する圏域をいう。それは、近隣地域を含んでより【広域的】であり、近隣地域と相関関係にある類似地域等の存する範囲を規定するものである。",src:"総論第6章 第1節 II (2)"},
{cat:"総論第6章",text:"住宅地の同一需給圏は、一般に都心への【通勤可能】な地域の範囲に一致する傾向がある。ただし、【地縁的選好性】により地域的範囲が狭められる傾向がある。",src:"総論第6章 第1節 II (2) ① ア"},
{cat:"総論第6章",text:"高度商業地の同一需給圏は、一般に広域的な【商業背後地】を基礎に成り立つ商業収益に関して代替性の及ぶ地域の範囲に一致する傾向があり、その範囲は高度商業地の性格に応じて広域的に形成される傾向がある。",src:"総論第6章 第1節 II (2) ① イ"},
{cat:"総論第6章",text:"大工場地（産業基盤指向型工業地）の同一需給圏は、一般に原材料、製品等の大規模な移動を可能にする高度の【輸送機関】に関して代替性を有する地域の範囲に一致する傾向があり、その地域的範囲は、【全国的な規模】となる傾向がある。",src:"総論第6章 第1節 II (2) ① ウ"},
{cat:"総論第6章",text:"地域分析における対象不動産に係る市場の特性の把握に当たっては、同一需給圏における【市場参加者】がどのような属性を有しており、どのような観点から不動産の利用形態を選択し、価格形成要因についての判断を行っているかを的確に把握することが重要である。",src:"総論第6章 第1節 III"},
{cat:"総論第6章",text:"把握した市場の特性については、近隣地域における【標準的使用】の判定に反映させるとともに鑑定評価の手法の適用、試算価格又は試算賃料の【調整】等における各種の判断においても反映すべきである。",src:"総論第6章 第1節 III"},
{cat:"総論第6章",text:"【個別分析】とは、対象不動産の個別的要因が対象不動産の利用形態と価格形成についてどのような影響力を持っているかを分析してその【最有効使用】を判定することをいう。",src:"総論第6章 第2節 I"},
{cat:"総論第6章",text:"個別的要因の分析においては、対象不動産に係る典型的な需要者がどのような個別的要因に着目して行動し、対象不動産と代替、競争等の関係にある不動産と比べた【優劣及び競争力の程度】をどのように評価しているかを的確に把握することが重要である。",src:"総論第6章 第2節 II"},
{cat:"総論第6章",text:"最有効使用の判定に当たっては、良識と通常の使用能力を持つ人が採用するであろうと考えられる使用方法であること、使用収益が将来【相当の期間】にわたって持続し得る使用方法であること、効用を十分に発揮し得る時点が【予測し得ない将来】でないことに留意すべきである。",src:"総論第6章 第2節 III (1)(2)(3)"},
{cat:"総論第6章",text:"個々の不動産の最有効使用は、一般に近隣地域の地域の特性の【制約下】にあるので、個別分析に当たっては、特に近隣地域に存する不動産の【標準的使用】との相互関係を明らかにし判定することが必要である。",src:"総論第6章 第2節 III (4)"},
{cat:"総論第6章",text:"住宅地の同一需給圏は、一般に都心への【通勤可能】な地域の範囲に一致する傾向がある。ただし、【地縁的選好性】により地域的範囲が狭められる傾向がある。",src:"総論第6章 第1節 II (2) ① ア"},
{cat:"総論第6章",text:"高度商業地の同一需給圏は、一般に広域的な【商業背後地】を基礎に成り立つ商業収益に関して代替性の及ぶ地域の範囲に一致する傾向があり、その範囲は高度商業地の性格に応じて【広域的】に形成される傾向がある。",src:"総論第6章 第1節 II (2) ① イ"},
{cat:"総論第6章",text:"大工場地（産業基盤指向型工業地）の同一需給圏は、一般に原材料、製品等の大規模な移動を可能にする高度の【輸送機関】に関して代替性を有する地域の範囲に一致する傾向があり、その地域的範囲は、【全国的な規模】となる傾向がある。",src:"総論第6章 第1節 II (2) ① ウ"},
{cat:"総論第6章",text:"地域分析における対象不動産に係る市場の特性の把握に当たっては、同一需給圏における【市場参加者】がどのような属性を有しており、どのような観点から不動産の利用形態を選択し、価格形成要因についての判断を行っているかを的確に把握することが重要である。",src:"総論第6章 第1節 III"},
{cat:"総論第6章",text:"近隣地域の特性は、通常、その地域に属する不動産の一般的な【標準的使用】に具体的に現れるが、この標準的使用は、利用形態からみた地域相互間の相対的位置関係及び【価格形成】を明らかにする手掛りとなる。",src:"総論第6章 第1節 I"},
{cat:"総論第6章",text:"地域分析に当たって特に重要な地域は、【用途的地域】（近隣地域及びその類似地域）と、近隣地域及びこれと相関関係にある類似地域を含むより広域的な地域、すなわち【同一需給圏】である。",src:"総論第6章 第1節 I"},
{cat:"総論第6章",text:"【類似地域】とは、近隣地域の地域の特性と類似する特性を有する地域であり、その地域に属する不動産は、特定の用途に供されることを中心として地域的にまとまりを持つものである。類似地域の類型は、近隣地域の種別と【同一の種別】に属するものであることが必要である。",src:"総論第6章 第1節 II (1) ②"},
{cat:"総論第6章",text:"【同一需給圏】とは、一般に対象不動産と【代替関係】が成立して、その価格の形成について相互に影響を及ぼすような関係にある他の不動産の存する圏域をいう。近隣地域を含んでより広域的であり、近隣地域と相関関係にある類似地域等の存する範囲を規定するものである。",src:"総論第6章 第1節 II (2)"},
{cat:"総論第6章",text:"【近隣地域】は対象不動産の属する用途的地域であって、居住・商業活動・工業生産活動等人の生活と活動に関して、ある特定の用途に供されることを中心として【地域的にまとまり】を示している地域をいう。",src:"総論第6章 第1節 II (1) ①"},
],
ch7:[
{cat:"総論第7章",text:"不動産の鑑定評価の方式には、【原価方式】、【比較方式】及び【収益方式】の三方式がある。原価方式は不動産の再調達に要する原価に着目して、比較方式は不動産の取引事例又は賃貸借等の事例に着目して、収益方式は不動産から生み出される収益に着目して、それぞれ不動産の価格又は賃料を求めようとするものである。",src:"総論第7章"},
{cat:"総論第7章",text:"不動産の価格を求める鑑定評価の基本的な手法は、【原価法】、【取引事例比較法】及び【収益還元法】に大別される。",src:"総論第7章 第1節"},
{cat:"総論第7章",text:"それぞれの鑑定評価の手法の適用により求められた価格又は賃料を【試算価格】又は【試算賃料】という。",src:"総論第7章"},
{cat:"総論第7章",text:"【原価法】は、価格時点における対象不動産の再調達原価を求め、この再調達原価について【減価修正】を行って対象不動産の試算価格を求める手法である（この手法による試算価格を【積算価格】という）。",src:"総論第7章 第1節 B I"},
{cat:"総論第7章",text:"【再調達原価】とは、対象不動産を価格時点において再調達することを想定した場合において必要とされる【適正な原価の総額】をいう。",src:"総論第7章 第1節 B II 1"},
{cat:"総論第7章",text:"建設資材、工法等の変遷により、対象不動産の再調達原価を求めることが困難な場合には、対象不動産と同等の有用性を持つものに置き換えて求めた原価（【置換原価】）を再調達原価とみなすものとする。",src:"総論第7章 第1節 B II 1"},
{cat:"総論第7章",text:"再調達原価を求める方法には【直接法】及び【間接法】があるが、収集した建設事例等の資料としての信頼度に応じていずれかを適用するものとし、また、必要に応じて【併用】するものとする。",src:"総論第7章 第1節 B II 3"},
{cat:"総論第7章",text:"減価の要因は、【物理的要因】、【機能的要因】及び【経済的要因】に分けられる。これらの要因は、それぞれ独立しているものではなく、相互に関連し、影響を与え合いながら作用していることに留意しなければならない。",src:"総論第7章 第1節 B III 2"},
{cat:"総論第7章",text:"物理的要因としては、不動産を使用することによって生ずる【摩滅及び破損】、時の経過又は自然的作用によって生ずる【老朽化】並びに【偶発的な損傷】があげられる。",src:"総論第7章 第1節 B III 2 ①"},
{cat:"総論第7章",text:"機能的要因としては、不動産の機能的陳腐化、すなわち、建物と敷地との【不適応】、設計の【不良】、型式の【旧式化】、設備の【不足】及びその能率の低下等があげられる。",src:"総論第7章 第1節 B III 2 ②"},
{cat:"総論第7章",text:"経済的要因としては、不動産の経済的不適応、すなわち、近隣地域の衰退、不動産とその付近の環境との不適合、不動産と代替、競争等の関係にある不動産又は付近の不動産との比較における【市場性の減退】等があげられる。",src:"総論第7章 第1節 B III 2 ③"},
{cat:"総論第7章",text:"減価額を求めるには、【耐用年数に基づく方法】と【観察減価法】の二つの方法があり、これらを【併用】するものとする。",src:"総論第7章 第1節 B III 3"},
{cat:"総論第7章",text:"【経済的残存耐用年数】とは、価格時点において、対象不動産の用途や利用状況に即し、物理的要因及び機能的要因に照らした劣化の程度並びに経済的要因に照らした市場競争力の程度に応じてその効用が十分に持続すると考えられる期間をいい、耐用年数に基づく方法の適用に当たり特に【重視】されるべきものである。",src:"総論第7章 第1節 B III 3 ①"},
{cat:"総論第7章",text:"【取引事例比較法】は、まず多数の取引事例を収集して適切な事例の選択を行い、これらに係る取引価格に必要に応じて【事情補正】及び【時点修正】を行い、かつ、【地域要因の比較】及び【個別的要因の比較】を行って求められた価格を比較考量し、これによって対象不動産の試算価格を求める手法である（この手法による試算価格を【比準価格】という）。",src:"総論第7章 第1節 C I"},
{cat:"総論第7章",text:"取引事例比較法の取引事例等は、次の要件の全部を備えるもののうちから選択するものとする。(1)近隣地域又は同一需給圏内の類似地域等に存する不動産であること、(2)取引事情が【正常なもの】と認められるものか正常なものに【補正】できること、(3)【時点修正】が可能なこと、(4)地域要因の比較及び個別的要因の比較が【可能なもの】であること。",src:"総論第7章 第1節 A II 1"},
{cat:"総論第7章",text:"【収益還元法】は、対象不動産が将来生み出すであろうと期待される【純収益の現在価値の総和】を求めることにより対象不動産の試算価格を求める手法である（この手法による試算価格を【収益価格】という）。",src:"総論第7章 第1節 D I"},
{cat:"総論第7章",text:"収益還元法は、文化財の指定を受けた建造物等の一般的に市場性を有しない不動産以外のものには【基本的にすべて適用】すべきものであり、自用の不動産といえども【賃貸を想定】することにより適用されるものである。",src:"総論第7章 第1節 D I"},
{cat:"総論第7章",text:"市場における不動産の取引価格の上昇が著しいときは、取引価格と収益価格との乖離が増大するものであるので、先走りがちな取引価格に対する有力な【験証手段】として、収益還元法が活用されるべきである。",src:"総論第7章 第1節 D I"},
{cat:"総論第7章",text:"収益価格を求める方法には、一期間の純収益を還元利回りによって還元する方法（【直接還元法】）と、連続する複数の期間に発生する純収益及び復帰価格を、その発生時期に応じて現在価値に割り引き、それぞれを合計する方法（【ＤＣＦ法】）がある。",src:"総論第7章 第1節 D II"},
{cat:"総論第7章",text:"【復帰価格】とは、保有期間の満了時点における対象不動産の価格をいい、基本的には保有期間満了の翌期の純収益を【最終還元利回り】で還元して求められる。",src:"総論第7章 第1節 D II (2)"},
{cat:"総論第7章",text:"【還元利回り】は、直接還元法の収益価格及びＤＣＦ法の復帰価格の算定において、一期間の純収益から対象不動産の価格を直接求める際に使用される率であり、将来の収益に影響を与える要因の変動予測と予測に伴う【不確実性】を含むものである。",src:"総論第7章 第1節 D II (1) 還元利回り"},
{cat:"総論第7章",text:"【割引率】は、ＤＣＦ法において、ある将来時点の収益を現在時点の価値に割り戻す際に使用される率であり、還元利回りに含まれる変動予測と予測に伴う不確実性のうち、収益見通しにおいて考慮された連続する複数の期間に発生する純収益や復帰価格の変動予測に係るものを【除く】ものである。",src:"総論第7章 第1節 D II (1) 割引率"},
{cat:"総論第7章",text:"還元利回りを求める方法のうち、Ｒ＝ＲＭ×ＷＭ＋ＲＥ×ＷＥの式は、【借入金】と【自己資金】に係る還元利回りから求める方法である。",src:"総論第7章 第1節 D II (2) ② (イ)"},
{cat:"総論第7章",text:"還元利回りを求める方法のうち、Ｒ＝Ｙ－ｇの式は、【割引率】との関係から求める方法であり、純収益が永続的に得られる場合で、かつ純収益が一定の趨勢を有すると想定される場合に有効である。",src:"総論第7章 第1節 D II (2) ② (エ)"},
{cat:"総論第7章",text:"DCF法における保有期間は、毎期の純収益及び復帰価格について精度の高い【予測】が可能な期間として決定する必要があり、不動産投資における【典型的な投資家】が保有する期間を標準とし、典型的な投資家が一般に想定しないような長期にわたる期間を設定してはならない。",src:"総論第7章 第1節 D 留意事項 ② ウ"},
{cat:"総論第7章",text:"不動産の賃料を求める鑑定評価の手法は、新規賃料にあっては【積算法】、【賃貸事例比較法】、【収益分析法】等があり、継続賃料にあっては【差額配分法】、【利回り法】、【スライド法】、【賃貸事例比較法】等がある。",src:"総論第7章 第2節"},
{cat:"総論第7章",text:"【実質賃料】とは、賃料の種類の如何を問わず賃貸人等に支払われる賃料の算定の期間に対応する適正な【すべての経済的対価】をいい、【純賃料】及び不動産の賃貸借等を継続するために通常必要とされる諸経費等（【必要諸経費等】）から成り立つものである。",src:"総論第7章 第2節 I"},
{cat:"総論第7章",text:"【支払賃料】とは、各支払時期に支払われる賃料をいい、契約に当たって、権利金、敷金、保証金等の一時金が授受される場合においては、当該一時金の【運用益】及び【償却額】と併せて実質賃料を構成するものである。",src:"総論第7章 第2節 I"},
{cat:"総論第7章",text:"賃料の算定の期間は、原則として、宅地並びに建物及びその敷地の賃料にあっては【１月】を単位とし、その他の土地にあっては【１年】を単位とするものとする。",src:"総論第7章 第2節 III"},
{cat:"総論第7章",text:"【積算法】は、対象不動産について、価格時点における【基礎価格】を求め、これに【期待利回り】を乗じて得た額に【必要諸経費等】を加算して対象不動産の試算賃料を求める手法である（この手法による試算賃料を【積算賃料】という）。",src:"総論第7章 第2節 B I"},
{cat:"総論第7章",text:"【基礎価格】とは、積算賃料を求めるための基礎となる価格をいい、【原価法】及び【取引事例比較法】により求めるものとする。",src:"総論第7章 第2節 B II 1"},
{cat:"総論第7章",text:"【期待利回り】とは、賃貸借等に供する不動産を取得するために要した資本に相当する額に対して期待される純収益のその資本相当額に対する割合をいう。",src:"総論第7章 第2節 B II 2"},
{cat:"総論第7章",text:"【差額配分法】は、対象不動産の経済価値に即応した適正な実質賃料と実際実質賃料との間に発生している【差額】について、契約の内容、契約締結の経緯等を総合的に勘案して、当該差額のうち賃貸人等に【帰属する部分】を適切に判定して得た額を実際実質賃料に加減して試算賃料を求める手法である。",src:"総論第7章 第2節 E I"},
{cat:"総論第7章",text:"【スライド法】は、直近合意時点における純賃料に【変動率】を乗じて得た額に価格時点における必要諸経費等を加算して試算賃料を求める手法である。",src:"総論第7章 第2節 G I"},
{cat:"総論第7章",text:"【利回り法】は、基礎価格に【継続賃料利回り】を乗じて得た額に必要諸経費等を加算して試算賃料を求める手法である。",src:"総論第7章 第2節 F I"},
{cat:"総論第7章",text:"【土地残余法】は、対象不動産が更地である場合において、当該土地に最有効使用の賃貸用建物等の建築を想定し、当該想定建物及びその敷地に基づく純収益から想定建物等に帰属する純収益を控除した残余の純収益を【還元利回り】で還元する手法である。",src:"総論第7章 第1節 D II イ"},
{cat:"総論第7章",text:"【建物残余法】は、不動産が敷地と建物等との結合によって構成されている場合において、当該不動産に基づく純収益から【敷地に帰属する純収益】を控除した残余の純収益を還元利回りで還元する手法である。",src:"総論第7章 第1節 D II ウ"},
{cat:"総論第7章",text:"積算法における必要諸経費等として、減価償却費、維持管理費（維持費・管理費・修繕費等）、【公租公課】（固定資産税・都市計画税等）、損害保険料、【貸倒れ準備費】、【空室等による損失相当額】があげられる。",src:"総論第7章 第2節 B II 3"},
{cat:"総論第7章",text:"【賃貸事例比較法】は、まず多数の新規の賃貸借等の事例を収集して適切な事例の選択を行い、これらに係る実際実質賃料に必要に応じて【事情補正】及び【時点修正】を行い、かつ地域要因の比較及び個別的要因の比較を行って求められた賃料を比較考量し、対象不動産の試算賃料（【比準賃料】）を求める手法である。",src:"総論第7章 第2節 C I"},
{cat:"総論第7章",text:"【収益分析法】は、一般の企業経営に基づく総収益を分析して対象不動産が一定期間に生み出すであろうと期待される純収益（減価償却後。これを【収益純賃料】という。）を求め、これに必要諸経費等を加算して試算賃料（【収益賃料】）を求める手法である。",src:"総論第7章 第2節 D I"},
{cat:"総論第7章",text:"継続賃料利回りは、直近合意時点における基礎価格に対する純賃料の割合を踏まえ、継続賃料固有の価格形成要因に留意しつつ、【期待利回り】、契約締結時及びその後の各賃料改定時の利回り、基礎価格の変動の程度、類似不動産の賃貸借等の事例における利回りを【総合的】に比較考量して求めるものとする。",src:"総論第7章 第2節 F II ②"},
{cat:"総論第7章",text:"スライド法における変動率は、直近合意時点から価格時点までの間における経済情勢等の変化に即応する変動分を表すものであり、土地及び建物価格の変動、【物価変動】、所得水準の変動等を示す各種【指数】や整備された不動産インデックス等を総合的に勘案して求めるものとする。",src:"総論第7章 第2節 G II ①"},
{cat:"総論第7章",text:"DCF法の保有期間は、毎期の純収益及び復帰価格について精度の高い【予測】が可能な期間として決定する必要があり、不動産投資における【典型的な投資家】が保有する期間を標準とし、典型的な投資家が一般に想定しないような長期にわたる期間を設定してはならない。",src:"総論第7章 第1節 D 留意事項 ② ウ"},
{cat:"総論第7章",text:"【最終還元利回り】は、価格時点の還元利回りをもとに、保有期間満了時点における市場動向並びにそれ以降の収益の変動予測及び予測に伴う【不確実性】を反映させて求めることが必要である。",src:"総論第7章 第1節 D 留意事項 ② オ"},
],
ch8:[
{cat:"総論第8章",text:"鑑定評価を行うためには、合理的かつ現実的な認識と判断に基づいた一定の【秩序的な手順】を必要とする。この手順は、一般に鑑定評価の基本的事項の確定、依頼者、提出先等及び利害関係等の確認、処理計画の策定、対象不動産の確認、資料の収集及び整理、資料の検討及び価格形成要因の分析、鑑定評価の手法の適用、試算価格又は試算賃料の調整、鑑定評価額の決定並びに鑑定評価報告書の作成の作業から成っている。",src:"総論第8章"},
{cat:"総論第8章",text:"鑑定評価に当たっては、まず、鑑定評価の基本的事項を確定しなければならない。このため、鑑定評価の【依頼目的】、【条件】及び依頼が必要となった背景について依頼者に明瞭に確認するものとする。",src:"総論第8章 第1節"},
{cat:"総論第8章",text:"関与不動産鑑定士及び関与不動産鑑定業者の対象不動産に関する【利害関係】又は対象不動産に関し利害関係を有する者との縁故若しくは特別の利害関係の有無及びその内容を明らかにしなければならない。",src:"総論第8章 第2節 II 1"},
{cat:"総論第8章",text:"対象不動産の確認は、対象不動産の【物的確認】及び【権利の態様の確認】に分けられ、実地調査、聴聞、公的資料の確認等により、的確に行う必要がある。",src:"総論第8章 第4節"},
{cat:"総論第8章",text:"物的確認を行うに当たっては、原則として【内覧の実施】を含めた実地調査を行うものとする。",src:"総論第8章 第4節 留意事項 (1)"},
{cat:"総論第8章",text:"【確認資料】とは、不動産の【物的確認】及び【権利の態様の確認】に必要な資料をいう。確認資料としては、登記事項証明書、土地又は建物等の図面、写真、不動産の所在地に関する地図等があげられる。",src:"総論第8章 第5節 I"},
{cat:"総論第8章",text:"【要因資料】とは、【価格形成要因】に照応する資料をいう。要因資料は、一般的要因に係る【一般資料】、地域要因に係る【地域資料】及び個別的要因に係る【個別資料】に分けられる。",src:"総論第8章 第5節 II"},
{cat:"総論第8章",text:"【事例資料】とは、鑑定評価の手法の適用に必要とされる現実の【取引価格】、【賃料】等に関する資料をいう。事例資料としては、建設事例、取引事例、収益事例、賃貸借等の事例等があげられる。",src:"総論第8章 第5節 III"},
{cat:"総論第8章",text:"鑑定評価の手法の適用に当たっては、地域分析及び個別分析により把握した対象不動産に係る市場の特性等を適切に反映した【複数の鑑定評価の手法】を適用すべきであり、複数の鑑定評価の手法の適用が困難な場合においても、その考え方をできるだけ【参酌】するように努めるべきである。",src:"総論第8章 第7節"},
{cat:"総論第8章",text:"【試算価格又は試算賃料の調整】とは、鑑定評価の複数の手法により求められた各試算価格又は試算賃料の【再吟味】及び各試算価格又は試算賃料が有する【説得力に係る判断】を行い、鑑定評価における最終判断である鑑定評価額の決定に導く作業をいう。",src:"総論第8章 第8節"},
{cat:"総論第8章",text:"試算価格又は試算賃料の調整に当たっては、対象不動産の価格形成を論理的かつ実証的に説明できるようにすることが重要であり、鑑定評価の手順の各段階について、【客観的】、【批判的】に再吟味し、その結果を踏まえた各試算価格又は各試算賃料が有する説得力の違いを適切に反映することによりこれを行う。",src:"総論第8章 第8節"},
{cat:"総論第8章",text:"公示区域において土地の正常価格を求めるときは、【公示価格を規準】としなければならない。",src:"総論第8章 第9節"},
{cat:"総論第8章",text:"価格形成要因について、専門職業家としての注意を尽くしてもなお対象不動産の価格形成に重大な影響を与える要因が十分に判明しない場合には、原則として【他の専門家が行った調査結果等】を活用することが必要である。",src:"総論第8章 第6節 III"},
{cat:"総論第8章",text:"処理計画の策定に当たっては、依頼者に対し次の事項を明瞭に確認しなければならない。(1)対象不動産の実地調査の範囲（【内覧の実施の有無】を含む。）、(2)他の専門家による調査結果等の活用の要否、(3)その他処理計画の策定のために必要な事項。",src:"総論第8章 第3節 留意事項 (2)"},
{cat:"総論第8章",text:"依頼者と関与不動産鑑定士及び関与不動産鑑定業者との間で明らかにすべき特別の取引関係として、当該不動産鑑定業者の鑑定評価等業務における受注額の【半分】に相当する額を超える取引額がある場合がある。",src:"総論第8章 第2節 II 2 留意事項 ③ オ"},
{cat:"総論第8章",text:"試算価格又は試算賃料の調整における説得力に係る判断として、(1)対象不動産に係る【地域分析及び個別分析の結果】と各手法との適合性、(2)各手法の適用において採用した資料の【特性及び限界】からくる相対的信頼性の2点に特に留意すべきである。",src:"総論第8章 第8節 II"},
{cat:"総論第8章",text:"試算価格又は試算賃料の再吟味において留意すべき事項として、①資料の選択・検討及び活用の適否、②諸原則の活用の適否、③地域分析及び個別分析の適否、④各種補正・修正等に係る判断の適否、⑤各手法に共通する価格形成要因に係る判断の【整合性】、⑥【単価と総額】との関連の適否がある。",src:"総論第8章 第8節 I"},
{cat:"総論第8章",text:"第１節から第８節で述べた手順を十分に尽した後、専門職業家としての【良心】に従い適正と判断される鑑定評価額を決定すべきである。",src:"総論第8章 第9節"},
{cat:"総論第8章",text:"資料の検討に当たっては、収集された資料について、それが鑑定評価の作業に活用するために必要にして十分な資料であるか否か、資料が【信頼するに足りる】ものであるか否かについて考察しなければならない。",src:"総論第8章 第6節 I"},
{cat:"総論第8章",text:"鑑定評価の成果は、採用した資料によって左右されるものであるから、資料の収集及び整理は、鑑定評価の作業に活用し得るように【適切かつ合理的な計画】に基づき行うものとし、【公正妥当】を欠くようなことがあってはならない。",src:"総論第8章 第5節"},
{cat:"総論第8章",text:"権利の態様の確認に当たっては、賃貸借契約等に係る権利の態様の確認として、原則として①契約の目的、②契約当事者、③契約期間、④契約数量、⑤【月額支払賃料】、⑥一時金の有無とその内容、⑦賃貸条件等に係る【特約】を確認しなければならない。",src:"総論第8章 第4節 II 留意事項 (2)"},
{cat:"総論第8章",text:"物的確認に当たっては、対象不動産について【登記事項証明書】等により登記又は登録されている内容とその実態との【異同】について把握する必要がある。",src:"総論第8章 第4節 I"},
],
ch9:[
{cat:"総論第9章",text:"鑑定評価報告書は、不動産の鑑定評価の成果を記載した文書であり、不動産鑑定士が自己の専門的学識と経験に基づいた【判断と意見】を表明し、その責任を明らかにすることを目的とするものである。",src:"総論第9章"},
{cat:"総論第9章",text:"鑑定評価報告書は、鑑定評価の基本的事項及び鑑定評価額を表し、鑑定評価額を決定した【理由を説明】し、その不動産の鑑定評価に関与した不動産鑑定士の【責任の所在】を示すことを主旨とするものである。",src:"総論第9章 第1節"},
{cat:"総論第9章",text:"鑑定評価報告書の内容は、不動産鑑定業者が依頼者に交付する鑑定評価書の実質的な内容となるものである。したがって、鑑定評価報告書は、鑑定評価書を通じて依頼者のみならず【第三者】に対しても影響を及ぼすものであり、さらには不動産の【適正な価格の形成の基礎】となるものである。",src:"総論第9章 第1節"},
{cat:"総論第9章",text:"正常価格又は正常賃料を求めることができる不動産について、依頼目的に対応した条件により限定価格、特定価格又は限定賃料を求めた場合は、かっこ書きで正常価格又は正常賃料である旨を付記して【それらの額を併記】しなければならない。",src:"総論第9章 第2節 I"},
{cat:"総論第9章",text:"特定価格を求めた場合には【法令等による社会的要請の根拠】を明らかにし、また、特殊価格を求めた場合には【文化財の指定の事実等】を明らかにしなければならない。",src:"総論第9章 第2節 V"},
{cat:"総論第9章",text:"建物及びその敷地に係る鑑定評価における最有効使用の判定の記載は、建物及びその敷地の最有効使用のほか、その敷地の【更地としての最有効使用】についても記載しなければならない。",src:"総論第9章 第2節 VII 2"},
{cat:"総論第9章",text:"試算価格又は試算賃料の再吟味において留意すべき事項として、(1)資料の選択、検討及び活用の適否、(2)不動産の価格に関する諸原則の活用の適否、(3)地域分析及び個別分析の適否、(4)各手法の適用において行った各種補正、修正等に係る判断の適否、(5)各手法に共通する価格形成要因に係る判断の【整合性】がある。",src:"総論第8章 第8節 I"},
{cat:"総論第9章",text:"鑑定評価報告書には、少なくとも鑑定評価額及び価格又は賃料の種類、鑑定評価の条件、対象不動産の所在等、対象不動産の確認に関する事項、鑑定評価の依頼目的及び条件、【価格時点及び鑑定評価を行った年月日】、鑑定評価額の決定の理由の要旨、鑑定評価上の不明事項に係る取扱い及び調査の範囲、関与不動産鑑定士及び関与不動産鑑定業者に係る【利害関係等】などを記載しなければならない。",src:"総論第9章 第2節"},
{cat:"総論第9章",text:"継続賃料を求めた場合には、【直近合意時点】について記載しなければならない。",src:"総論第9章 第2節 VII 7"},
{cat:"総論第9章",text:"附属資料として、対象不動産等の所在を明示した地図、土地又は建物等の図面、【写真】等の確認資料、事例資料等は、必要に応じて鑑定評価報告書に添付するものとする。",src:"総論第9章 第3節"},
{cat:"総論第9章",text:"鑑定評価報告書には、支払賃料を求めた場合には、その支払賃料と【実質賃料】との関連を記載しなければならない。また、継続賃料を求めた場合には、【直近合意時点】について記載しなければならない。",src:"総論第9章 第2節 VII 7"},
{cat:"総論第9章",text:"鑑定評価報告書の鑑定評価の条件の記載において、特に当該条件が設定されない場合の価格等の参考事項を記載すべき場合があり、対象確定条件、想定上の条件又は調査範囲等条件についてそれらの条件の内容及び評価における取扱いが妥当なものであると判断した【根拠】を明らかにしなければならない。",src:"総論第9章 第2節 II"},
{cat:"総論第9章",text:"鑑定評価報告書の対象不動産の確認に関する事項には、実地調査を行った年月日及び実地調査を行った不動産鑑定士の氏名、立会人の氏名及び職業、実地調査を行った範囲（【内覧の実施の有無】を含む。）を記載しなければならない。",src:"総論第9章 第2節 IV"},
{cat:"総論第9章",text:"鑑定評価報告書の鑑定評価額の決定の理由の要旨には、①地域分析及び個別分析に係る事項、②最有効使用の判定に関する事項、③鑑定評価の手法の適用に関する事項、④試算価格又は試算賃料の【調整】に関する事項、⑤【公示価格との規準】に関する事項、⑥当事者間で事実の主張が異なる事項を記載する。",src:"総論第9章 第2節 VII"},
{cat:"総論第9章",text:"鑑定評価報告書には、【Ⅰ鑑定評価額及び価格又は賃料の種類】から【Ⅻ鑑定評価額の公表の有無】に掲げる事項について記載しなければならない。このうち【関与不動産鑑定士の氏名】はⅩ、【依頼者及び提出先等の氏名又は名称】はⅪに記載する。",src:"総論第9章 第2節"},
{cat:"総論第9章",text:"鑑定評価報告書の作成に当たっては、まず鑑定評価の過程において採用したすべての資料を整理し、価格形成要因に関する判断、鑑定評価の手法の適用に係る判断等に関する事項を明確にして、これに基づいて作成すべきであり、【誤解の生ずる余地】を与えないよう留意しなければならない。",src:"総論第9章 第1節"},
{cat:"総論第9章",text:"他の専門家が行った調査結果等を活用するために入手した調査報告書等の資料についても、必要に応じて附属資料として添付するものとする。ただし、当該他の専門家の【同意が得られない】ときは、この限りでない。",src:"総論第9章 第3節"},
{cat:"総論第9章",text:"建物及びその敷地に係る鑑定評価における最有効使用の判定の記載は、建物及びその敷地の最有効使用のほか、その敷地の【更地としての最有効使用】についても記載しなければならない。",src:"総論第9章 第2節 VII 2"},
{cat:"総論第9章",text:"鑑定評価上の不明事項に係る取扱い及び調査の範囲として、不動産鑑定士が自ら行った調査の【範囲及び内容】を明確にするとともに、他の専門家が行った調査結果等を活用した場合においては、当該専門家が調査した範囲及び内容を明確にしなければならない。",src:"総論第9章 第2節 VIII"},
],
ka1:[
{cat:"各論第1章",text:"更地の鑑定評価額は、更地並びに配分法が適用できる場合における建物及びその敷地の取引事例に基づく【比準価格】並びに【土地残余法】による収益価格を関連づけて決定するものとする。再調達原価が把握できる場合には、【積算価格】をも関連づけて決定すべきである。",src:"各論第1章 第1節 I 1"},
{cat:"各論第1章",text:"建付地の鑑定評価額は、更地の価格をもとに当該建付地の更地としての最有効使用との格差、更地化の難易の程度等敷地と建物等との関連性を考慮して求めた価格を標準とし、【配分法】に基づく比準価格及び土地残余法による収益価格を【比較考量】して決定するものとする。",src:"各論第1章 第1節 I 2"},
{cat:"各論第1章",text:"借地権の価格は、借地借家法に基づき土地を使用収益することにより借地権者に帰属する【経済的利益】（一時金の授受に基づくものを含む。）を貨幣額で表示したものである。",src:"各論第1章 第1節 I 3 (1) ①"},
{cat:"各論第1章",text:"底地の価格は、借地権の付着している宅地について、借地権の価格との相互関連において借地権設定者に帰属する経済的利益を貨幣額で表示したものである。借地権設定者に帰属する経済的利益とは、当該宅地の実際支払賃料から諸経費等を控除した部分の賃貸借等の期間に対応する経済的利益及びその期間の満了等によって【復帰】する経済的利益の現在価値をいう。",src:"各論第1章 第1節 I 3 (2)"},
{cat:"各論第1章",text:"自用の建物及びその敷地の鑑定評価額は、【積算価格】、【比準価格】及び【収益価格】を関連づけて決定するものとする。",src:"各論第1章 第2節 I"},
{cat:"各論第1章",text:"貸家及びその敷地の鑑定評価額は、実際実質賃料に基づく純収益等の現在価値の総和を求めることにより得た【収益価格】を標準とし、【積算価格】及び【比準価格】を比較考量して決定するものとする。",src:"各論第1章 第2節 II"},
{cat:"各論第1章",text:"【借家権】とは、借地借家法（廃止前の借家法を含む。）が適用される建物の【賃借権】をいう。",src:"各論第1章 第3節 III"},
{cat:"各論第1章",text:"建物及びその敷地が一体として市場性を有しない場合における建物のみの鑑定評価は、一般に【特殊価格】を求める場合に該当するものであり、この場合における建物の鑑定評価額は、【積算価格】を標準として決定するものとする。",src:"各論第1章 第3節 II"},
{cat:"各論第1章",text:"農地の鑑定評価額は、【比準価格】を標準とし、収益価格を参考として決定するものとする。再調達原価が把握できる場合には、積算価格をも関連づけて決定すべきである。",src:"各論第1章 第1節 II"},
{cat:"各論第1章",text:"宅地見込地の鑑定評価額は、比準価格及び当該宅地見込地について、価格時点において、転換後・造成後の更地を想定し、その価格から通常の造成費相当額及び発注者が直接負担すべき通常の付帯費用を控除し、その額を当該宅地見込地の【熟成度】に応じて適切に修正して得た価格を関連づけて決定するものとする。",src:"各論第1章 第1節 IV"},
{cat:"各論第1章",text:"特定価格を求める場合のうち、証券化対象不動産に係る鑑定評価目的の下で投資採算価値を求める場合は、基本的に収益還元法のうち【ＤＣＦ法】により求めた試算価格を標準とし、直接還元法による検証を行って求めた収益価格に基づき、比準価格及び積算価格による検証を行い鑑定評価額を決定する。",src:"各論第1章 第4節 I"},
{cat:"各論第1章",text:"特定価格を求める場合のうち、民事再生法に基づく鑑定評価目的の下で早期売却を前提とした価格を求める場合は、通常の市場公開期間より短い期間で売却されるという前提で、原則として【比準価格】と【収益価格】を関連づけ、積算価格による検証を行って鑑定評価額を決定する。",src:"各論第1章 第4節 II"},
{cat:"各論第1章",text:"更地の鑑定評価において、当該更地の面積が近隣地域の標準的な土地の面積に比べて大きい場合等においては、一体利用をすることが合理的と認められるときは【開発法】を適用する。開発法の試算価格は、販売総額から通常の建物建築費相当額及び発注者が直接負担すべき通常の付帯費用を控除して得た価格である。",src:"各論第1章 第1節 I 1"},
{cat:"各論第1章",text:"建付地の鑑定評価において、複合不動産価格をもとに敷地に帰属する額を配分する方法として、複合不動産価格に占める敷地の構成割合を乗じる【割合法】と、複合不動産価格から建物等の価格を控除する【控除法】がある。",src:"各論第1章 第1節 I 2 留意事項"},
{cat:"各論第1章",text:"借地権及び底地の鑑定評価に当たっては、借地権の価格と底地の価格とは【密接に関連し合っている】ので、宅地の賃貸借等及び借地権取引の慣行の有無とその成熟の程度等を十分に考慮して相互に比較検討すべきである。",src:"各論第1章 第1節 I 3"},
{cat:"各論第1章",text:"借地権の鑑定評価額は、原則として取引事例に基づく【比準価格】及び【土地残余法】等による収益価格を関連づけて決定するものとし、借地権の取引慣行が成熟している地域については、【更地の価格に借地権割合】を乗じる方法も参考とする。",src:"各論第1章 第1節 I 3 (1)"},
{cat:"各論第1章",text:"底地の鑑定評価額は、原則として、借地権が付着している場合において底地に帰属する純収益を還元利回りで還元する方法等による【収益価格】を標準とし、取引事例に基づく比準価格を比較考量して決定する。底地の取引慣行が成熟している地域では、更地の価格から【借地権価格】を控除する方法も参考とする。",src:"各論第1章 第1節 I 3 (2)"},
{cat:"各論第1章",text:"区分地上権の鑑定評価額は、区分地上権の設定がない更地の価格に対応する収益価格から、区分地上権が設定された後の底地相当の更地の価格に対応する収益価格を控除した価格等を基礎として、区分地上権に係る使用収益の内容、期間等を勘案して決定する。この場合において、取引事例に基づく【比準価格】を比較考量して決定することができる。",src:"各論第1章 第1節 I 4"},
{cat:"各論第1章",text:"林地の鑑定評価額は、【比準価格】を標準とし、収益価格を参考として決定するものとする。なお農地・林地については、再調達原価が把握できる場合には、積算価格をも関連づけて決定すべきである。",src:"各論第1章 第1節 II・III"},
{cat:"各論第1章",text:"借地権付建物の鑑定評価額は、自用の建物及びその敷地の鑑定評価額から当該建物及びその敷地に係る更地の価格に相当する額を控除し、借地権の価格に対応する額を加算して求めた価格等を標準として決定するものとする。また、比準価格及び収益価格を比較考量して決定する。",src:"各論第1章 第2節 III"},
{cat:"各論第1章",text:"区分所有建物及びその敷地（自用）の鑑定評価額は、【積算価格】及び比準価格を関連づけ、収益価格を比較考量して決定するものとする。貸室等の賃貸借が行われている区分所有建物（賃貸）の鑑定評価額は、収益価格を標準とし、積算価格及び比準価格を比較考量して決定するものとする。",src:"各論第1章 第2節 IV"},
{cat:"各論第1章",text:"会社更生法又は民事再生法の規定による鑑定評価目的の下で事業継続を前提とした価格を求める場合は、原則として【収益価格】を標準とし、積算価格及び比準価格による検証を行って鑑定評価額を決定するものとし、この場合の収益価格は【直接還元法】及びDCF法のいずれも適用するものとする。",src:"各論第1章 第4節 III"},
],
ka2:[
{cat:"各論第2章",text:"宅地の正常賃料の鑑定評価額は、【積算賃料】、【比準賃料】及び配分法に準ずる方法に基づく比準賃料を関連づけて決定するものとする。",src:"各論第2章 第1節 I 2"},
{cat:"各論第2章",text:"宅地の継続賃料固有の価格形成要因は、直近合意時点から価格時点までの期間における要因が中心となり、主なものとして、近隣地域等における賃料又は代替競争不動産の賃料の推移及びその改定の程度、【土地価格の推移】、【公租公課の推移】、契約の内容及びそれに関する経緯がある。",src:"各論第2章 第1節 II 1"},
{cat:"各論第2章",text:"継続中の宅地の賃貸借等の契約に基づく実際支払賃料を改定する場合の鑑定評価額は、【差額配分法】による賃料、【利回り法】による賃料、【スライド法】による賃料及び比準賃料を関連づけて決定するものとする。",src:"各論第2章 第1節 II 2"},
{cat:"各論第2章",text:"建物及びその敷地の正常賃料の鑑定評価額は、【積算賃料】及び【比準賃料】を関連づけて決定するものとする。この場合において、純収益を適切に求めることができるときは収益賃料を比較考量して決定するものとする。",src:"各論第2章 第2節 I 2"},
{cat:"各論第2章",text:"宅地の新規賃料固有の価格形成要因の主なものとして、当該地域の賃貸借等の【契約慣行】、賃貸借等の種類・目的、一時金の授受の有無及びその内容並びに特約事項の有無及びその内容等の【新規賃料を求める前提となる契約内容】がある。",src:"各論第2章 第1節 I 1"},
{cat:"各論第2章",text:"積算賃料を求めるに当たっての基礎価格は、最有効使用が可能な場合は、更地の経済価値に即応した価格であり、建物の所有を目的とする賃貸借等の場合で契約により敷地の最有効使用が見込めないときは、当該契約条件を前提とする【建付地】としての経済価値に即応した価格である。",src:"各論第2章 第1節 留意事項 (1) ①"},
{cat:"各論第2章",text:"賃料改定が契約期間の満了に伴う更新又は借地権の第三者への譲渡を契機とする場合において、【更新料】又は【名義書替料】が支払われるときは、これらの額を総合的に勘案して求めるものとする。",src:"各論第2章 第1節 II 2 なお書き"},
{cat:"各論第2章",text:"継続賃料の鑑定評価額は、現行賃料を前提として、【直近合意時点】以降において、公租公課、土地及び建物価格、近隣地域若しくは同一需給圏内の類似地域等における賃料の変動等のほか、賃貸借等の契約の経緯、賃料改定の経緯及び契約内容を総合的に勘案し、契約当事者間の公平に留意の上決定するものである。",src:"総論第7章 第2節 IV"},
{cat:"各論第2章",text:"建物及びその敷地の継続賃料を求める場合の鑑定評価は、宅地の継続賃料を求める場合の鑑定評価に準ずるものとする。この場合において、「土地価格の推移」とあるのは「【土地及び建物価格の推移】」と、「底地に対する利回りの推移」とあるのは「【建物及びその敷地に対する利回り】」と、それぞれ読み替えるものとする。",src:"各論第2章 第2節 II"},
{cat:"各論第2章",text:"配分法に準ずる方法に基づく比準賃料は、宅地を含む複合不動産の賃貸借等の契約内容が類似している賃貸借等の事例に係る実際実質賃料から宅地以外の部分に対応する実際実質賃料相当額を【控除】する等により求めた比準賃料をいう。",src:"各論第2章 第1節 留意事項 (3)"},
{cat:"各論第2章",text:"【賃貸事業分析法】は、建物及びその敷地に係る賃貸事業に基づく純収益をもとに土地に帰属する部分を査定して宅地の試算賃料を求める方法である。",src:"各論第2章 第1節 I 2"},
{cat:"各論第2章",text:"宅地の新規賃料固有の価格形成要因の主なものとして、当該地域の賃貸借等の【契約慣行】、賃貸借等の種類・目的、一時金の授受の有無及びその内容並びに特約事項の有無及びその内容等の新規賃料を求める前提となる【契約内容】がある。",src:"各論第2章 第1節 I 1"},
{cat:"各論第2章",text:"積算賃料を求めるに当たっての基礎価格は、最有効使用が可能な場合は、更地の経済価値に即応した価格であり、建物の所有を目的とする賃貸借等の場合で契約により敷地の最有効使用が見込めないときは、当該契約条件を前提とする【建付地】としての経済価値に即応した価格である。",src:"各論第2章 第1節 留意事項 (1) ①"},
{cat:"各論第2章",text:"賃料改定が契約期間の満了に伴う更新又は借地権の第三者への譲渡を契機とする場合において、【更新料】又は【名義書替料】が支払われるときは、これらの額を総合的に勘案して求めるものとする。",src:"各論第2章 第1節 II 2 なお書き"},
{cat:"各論第2章",text:"継続賃料の鑑定評価額は、現行賃料を前提として、【直近合意時点】以降において、公租公課・土地及び建物価格・近隣地域若しくは同一需給圏内の類似地域等における賃料の変動等のほか、賃貸借等の契約の経緯・賃料改定の経緯及び契約内容を総合的に勘案し、【契約当事者間の公平】に留意の上決定するものである。",src:"総論第7章 第2節 IV"},
{cat:"各論第2章",text:"差額配分法の適用において、対象不動産の経済価値に即応した適正な実質賃料は、価格時点において想定される【新規賃料】であり、積算法、賃貸事例比較法等により求めるものとする。賃貸人等に帰属する部分については、継続賃料固有の価格形成要因に留意しつつ、差額発生の要因を【広域的】に分析し、さらに契約内容及び契約締結の経緯等に関する分析を行うことにより適切に判断するものとする。",src:"総論第7章 第2節 E II"},
{cat:"各論第2章",text:"建物及びその敷地（家賃）の継続賃料を求める場合の鑑定評価は、宅地の継続賃料を求める場合に準ずるものとし、差額配分法による賃料、利回り法による賃料、スライド法による賃料及び【比準賃料】を関連づけて決定するものとする。",src:"各論第2章 第2節 II"},
{cat:"各論第2章",text:"賃貸事例比較法の事例の選択に当たっては、新規賃料、継続賃料の別又は建物の用途の別により【賃料水準】が異なるのが一般的であることに留意して、できる限り対象不動産に類似した事例を選択すべきである。",src:"総論第7章 第2節 C 留意事項 (2) ①"},
{cat:"各論第2章",text:"賃料を求める場合の地域要因の比較に当たっては、賃料固有の価格形成要因が存すること等により、価格を求める場合の地域と賃料を求める場合の地域とでは、それぞれの【地域の範囲】及び【地域の格差】を異にすることに留意することが必要である。",src:"総論第7章 第2節 C 留意事項 (2) ②"},
{cat:"各論第2章",text:"支払賃料の鑑定評価を依頼された場合における鑑定評価額の記載は、支払賃料である旨を付記して支払賃料の額を表示するとともに、当該支払賃料が実質賃料と異なる場合においては、かっこ書きで【実質賃料である旨】を付記して実質賃料の額を【併記】するものとする。",src:"総論第9章 第2節 I"},
],
ka3:[
{cat:"各論第3章",text:"【証券化対象不動産】とは、資産の流動化に関する法律に規定する資産の流動化並びに投資信託及び投資法人に関する法律に規定する投資信託に係る不動産取引並びに同法に規定する投資法人が行う不動産取引等の目的である不動産又は不動産取引の目的となる見込みのある不動産（信託受益権に係るものを含む。）をいう。",src:"各論第3章 第1節 I"},
{cat:"各論第3章",text:"不動産鑑定士は、証券化対象不動産の鑑定評価の依頼者のみならず広範な【投資家等】に重大な影響を及ぼすことを考慮するとともに、不動産鑑定評価制度に対する社会的信頼性の確保等について重要な責任を有していることを認識し、証券化対象不動産の鑑定評価の手順について常に最大限の配慮を行いつつ、鑑定評価を行わなければならない。",src:"各論第3章 第1節 II (1)"},
{cat:"各論第3章",text:"証券化対象不動産の未竣工建物等鑑定評価は、総論第５章第１節のなお書きに定める要件に加え、工事の中止、工期の延期又は工事内容の変更が発生した場合に生じる損害が、当該不動産に係る売買契約上の約定や【各種保険等】により回避される場合に限り行うことができる。",src:"各論第3章 第2節"},
{cat:"各論第3章",text:"処理計画の策定に当たっては、あらかじめ、依頼者に対し、証券化対象不動産の鑑定評価に関する次の事項を確認する。その中に【エンジニアリング・レポート】（建築物、設備等及び環境に関する専門的知識を有する者が行った証券化対象不動産の状況に関する調査報告書）の入手時期等が含まれる。",src:"各論第3章 第3節 I (3)"},
{cat:"各論第3章",text:"証券化対象不動産の個別的要因の調査等に当たっては、依頼者（依頼者が指定した者を含む。）の【立会いの下】、対象不動産の内覧の実施を含めた実地調査を行うとともに、対象不動産の管理者からの聴聞等により権利関係、公法上の規制、アスベスト等の有害物質、耐震性及び増改築等の履歴等に関し鑑定評価に必要な事項を確認しなければならない。",src:"各論第3章 第4節 I"},
{cat:"各論第3章",text:"証券化対象不動産の鑑定評価に当たっては、不動産鑑定士は、依頼者に対し当該鑑定評価に際し必要な【エンジニアリング・レポート】の提出を求め、その内容を分析・判断した上で、鑑定評価に活用しなければならない。",src:"各論第3章 第4節 III (1)"},
{cat:"各論第3章",text:"証券化対象不動産の鑑定評価を複数の不動産鑑定士が共同して行う場合にあっては、それぞれの不動産鑑定士の役割を明確にした上で、常に鑑定評価業務全体の情報を【共有】するなど密接かつ十分な連携の下、すべての不動産鑑定士が一体となって鑑定評価の業務を遂行しなければならない。",src:"各論第3章 第1節 II (3)"},
{cat:"各論第3章",text:"証券化対象不動産以外の不動産の鑑定評価を行う場合にあっても、【投資用の賃貸大型不動産】の鑑定評価を行う場合その他の投資家及び購入者等の保護の観点から必要と認められる場合には、この章の定めに準じて、鑑定評価を行うよう努めなければならない。",src:"各論第3章 第1節 I"},
{cat:"各論第3章",text:"確認事項の記録について、処理計画の策定に当たっての確認を行った場合には、確認を行った年月日、確認を行った不動産鑑定士の氏名、確認の相手方の氏名及び職業、確認の内容及び当該内容の処理計画への反映状況等に関する記録を作成し、及び鑑定評価報告書の【附属資料】として添付しなければならない。",src:"各論第3章 第3節 II"},
{cat:"各論第3章",text:"ＤＣＦ法を適用するにあたり、証券化対象不動産の鑑定評価書については、依頼者及び証券化対象不動産に係る利害関係者その他の者がその内容を容易に把握・比較することができるようにするため、鑑定評価報告書の記載方法等を工夫し、及び鑑定評価に活用した資料等を明示することができるようにするなど【説明責任】が十分に果たされるものとしなければならない。",src:"各論第3章 第1節 II (2)"},
{cat:"各論第3章",text:"依頼者が証券化関係者（オリジネーター、アレンジャー、アセットマネジャー、レンダー、エクイティ投資家又は特別目的会社・投資法人・ファンド等）のいずれであるかの別及び依頼者と証券化関係者との資本関係又は取引関係の有無等を【鑑定評価報告書】に記載しなければならない。",src:"各論第3章 第3節 III"},
{cat:"各論第3章",text:"証券化対象不動産の鑑定評価に当たっては、不動産鑑定士は、依頼者に対し当該鑑定評価に際し必要な【エンジニアリング・レポート】の提出を求め、その内容を分析・判断した上で、鑑定評価に活用しなければならない。",src:"各論第3章 第4節 III (1)"},
{cat:"各論第3章",text:"【エンジニアリング・レポート】とは、建築物、設備等及び環境に関する専門的知識を有する者が行った証券化対象不動産の状況に関する【調査報告書】をいい、処理計画の策定に当たっての確認事項の一つとしてその入手時期等が含まれる。",src:"各論第3章 第3節 I (3)"},
{cat:"各論第3章",text:"証券化対象不動産の個別的要因の調査等に当たっては、依頼者（依頼者が指定した者を含む。）の【立会いの下】、対象不動産の内覧の実施を含めた実地調査を行うとともに、対象不動産の管理者からの聴聞等により権利関係、公法上の規制、【アスベスト等の有害物質】、耐震性及び増改築等の履歴等に関し鑑定評価に必要な事項を確認しなければならない。",src:"各論第3章 第4節 I"},

{cat:"各論第3章",text:"証券化対象不動産の鑑定評価においては、【直接還元法】及び【DCF法】のいずれも適用するものとし、特に収益価格を求める過程について説明性に優れたDCF法を中心として収益価格を求め、直接還元法による検証を行うものとする。",src:"各論第3章 第5節 I"},

{cat:"各論第3章",text:"証券化対象不動産の鑑定評価においてDCF法を適用する場合、総収益の算定に当たっては、契約賃料と市場実勢賃料（【市場賃料】）との乖離に留意し、また総費用の算定に当たっては、維持管理費、修繕費、資本的支出、テナント費用等の各費用項目を【統一した基準】に従って計上するものとする。",src:"各論第3章 第5節 II"},

};

const catNames={
  ch1:'総論第1章',ch2:'総論第2章',ch3:'総論第3章',
  ch4:'総論第4章',ch5:'総論第5章',ch6:'総論第6章',
  ch7:'総論第7章',ch8:'総論第8章',ch9:'総論第9章',
  ka1:'各論第1章',ka2:'各論第2章',ka3:'各論第3章'
};
let curCat='',qs=[],idx=0,sc=0,wl=[],retry=false;

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}

function startQuiz(cat){
  curCat=cat;retry=false;
  if(cat==='all'){
    qs=[];for(const k of Object.keys(Q))Q[k].forEach(q=>qs.push({...q}));
  }else{
    qs=Q[cat].map(q=>({...q}));
  }
  shuffle(qs);idx=0;sc=0;wl=[];showQuiz();
}

function retryWrong(){if(!wl.length){backToMenu();return}retry=true;qs=[...wl];shuffle(qs);idx=0;sc=0;wl=[];showQuiz()}

function showQuiz(){
  document.getElementById('menuView').classList.add('hidden');
  document.getElementById('resultView').classList.add('hidden');
  document.getElementById('quizView').classList.remove('hidden');
  document.getElementById('progressBar').style.display='block';
  showQ();
}

function showQ(){
  const q=qs[idx];
  document.getElementById('chapterLabel').textContent=q.cat;
  document.getElementById('qNumber').textContent=`問 ${idx+1} / ${qs.length}`;
  document.getElementById('headerSub').textContent=retry?'復習モード':(curCat==='all'?'全問まとめ':(catNames[curCat]||''));
  document.getElementById('sourceText').textContent='出典: '+q.src;
  const html=q.text.replace(/【(.*?)】/g,function(m,p1){
    return '<span class="blank" data-answer="'+p1.replace(/"/g,'&quot;')+'">'+p1.replace(/./g,'_')+'</span>';
  });
  document.getElementById('cardText').innerHTML=html;
  document.getElementById('revealBtn').style.display='block';
  document.getElementById('judgeRow').style.display='none';
  document.getElementById('nextBtn').style.display='none';
  document.getElementById('progressFill').style.width=(idx/qs.length*100)+'%';
  window.scrollTo(0,0);
}

function revealAll(){
  document.querySelectorAll('.blank').forEach(el=>{
    el.textContent=el.dataset.answer;
    el.classList.add('revealed');
  });
  document.getElementById('revealBtn').style.display='none';
  document.getElementById('judgeRow').style.display='flex';
}

function judge(ok){
  if(ok)sc++;else wl.push(qs[idx]);
  document.getElementById('judgeRow').style.display='none';
  document.getElementById('nextBtn').style.display='block';
  document.getElementById('nextBtn').textContent=idx<qs.length-1?'次の問題へ':'結果を見る';
}

function nextQ(){idx++;if(idx>=qs.length)showResult();else showQ()}

function showResult(){
  document.getElementById('quizView').classList.add('hidden');
  document.getElementById('resultView').classList.remove('hidden');
  document.getElementById('progressBar').style.display='none';
  document.getElementById('resultScore').textContent=sc+' / '+qs.length;
  const p=Math.round(sc/qs.length*100);
  document.getElementById('resultText').textContent=`暗記率 ${p}%　${p===100?'完璧です！':p>=80?'よく覚えています！':p>=60?'もう少し！':'繰り返し復習しましょう！'}`;
  document.getElementById('headerSub').textContent='結果';
}

function backToMenu(){
  document.getElementById('quizView').classList.add('hidden');
  document.getElementById('resultView').classList.add('hidden');
  document.getElementById('menuView').classList.remove('hidden');
  document.getElementById('progressBar').style.display='none';
  document.getElementById('headerSub').textContent='定義・原則を覚えよう';
}

// バッジ更新
let total=0;
for(const k of Object.keys(Q)){
  const n=Q[k].length;
  total+=n;
  const el=document.getElementById('b_'+k);
  if(el)el.textContent=n+'問';
}
document.getElementById('totalBadge').textContent=total+'問';
</script>
</body>
</html>
