<script>
const Q={
def1:[
{cat:"第1章",text:"不動産の価格は、一般に、(1)その不動産に対してわれわれが認める【効用】、(2)その不動産の【相対的稀少性】、(3)その不動産に対する【有効需要】の三者の相関結合によって生ずる【経済価値】を貨幣額で表示したものである。",src:"総論第1章 II"},
{cat:"第1章",text:"この不動産のあり方は、【自然的】、【社会的】、【経済的】及び【行政的】な要因の相互作用によって決定されるとともに【経済価値の本質】を決定づけている。",src:"総論第1章 I"},
{cat:"第1章",text:"不動産の鑑定評価とは、現実の社会経済情勢の下で合理的と考えられる市場で形成されるであろう【市場価値】を表示する【適正な価格】を、不動産鑑定士が的確に把握する作業に代表される。",src:"総論第1章 IV"},
{cat:"第1章",text:"不動産の鑑定評価とは、不動産の価格に関する専門家の【判断】であり、【意見】であるといってよいであろう。",src:"総論第1章 IV"},
{cat:"第1章",text:"鑑定評価の判断の当否は、不動産鑑定士の能力の【如何】及びその能力の行使の【誠実さ】の如何に係るものである。",src:"総論第1章 IV"},
{cat:"第1章",text:"鑑定評価は、高度な【知識】と豊富な【経験】及び的確な【判断力】を持ち、さらに、これらが【有機的】かつ【総合的】に発揮できる練達堪能な専門家によってなされるとき、初めて合理的であって、客観的に論証できるものとなる。",src:"総論第1章 IV"},
{cat:"第1章",text:"土地の自然的特性は【固定的】であって【硬直的】であり、人文的特性は【可変的】であって【伸縮的】である。",src:"総論第1章 III"},
{cat:"第1章",text:"不動産の価格（又は賃料）は、通常、【過去】と【将来】とにわたる長期的な考慮の下に形成される。",src:"総論第1章 II"},
{cat:"第1章",text:"不動産鑑定士は、【良心】に従い、誠実に不動産の鑑定評価を行い、専門職業家としての【社会的信用】を傷つけるような行為をしてはならない。",src:"総論第1章 V"},
{cat:"第1章",text:"不動産鑑定士は、正当な理由がなくて、その職務上取り扱ったことについて知り得た【秘密】を他に漏らしてはならない。",src:"総論第1章 V"},
{cat:"第1章",text:"縁故若しくは特別の利害関係を有する場合等、公平な鑑定評価を害する恐れのあるときは、【原則として】不動産の鑑定評価を引き受けてはならない。",src:"総論第1章 V (5)"},
{cat:"第1章",text:"不動産の価格と賃料との間には、いわゆる【元本】と【果実】との間に認められる相関関係を認めることができる。",src:"総論第1章 II"},
{cat:"第1章",text:"不動産は地域の【構成分子】として地域との間に【依存】、【補完】等の関係にたち、地域内の他の不動産との間に【協働】、【代替】、【競争】等の関係にたつ。",src:"総論第1章 III"},
{cat:"第1章",text:"判断の当否は、必要な関連諸資料の【収集整理】の適否及びこれらの諸資料の分析解釈の【練達の程度】に依存するものである。",src:"総論第1章 IV"},
{cat:"第1章",text:"不動産鑑定士は、依頼者に対して鑑定評価の結果を分かり易く【誠実に説明】を行い得るようにするとともに、社会一般に対しても不動産の鑑定評価に対する【信頼を高める】よう努めなければならない。",src:"総論第1章 V"}
],
def2:[
{cat:"第2章",text:"不動産の【種別】とは、不動産の【用途】に関して区分される不動産の分類をいう。",src:"総論第2章"},
{cat:"第2章",text:"不動産の【類型】とは、その【有形的利用】及び【権利関係】の態様に応じて区分される不動産の分類をいう。",src:"総論第2章"},
{cat:"第2章",text:"【宅地地域】とは、居住、商業活動、工業生産活動等の用に供される建物、構築物等の敷地の用に供されることが、自然的、社会的、経済的及び行政的観点からみて合理的と判断される地域をいう。",src:"総論第2章 I"},
{cat:"第2章",text:"【農地地域】とは、農業生産活動のうち耕作の用に供されることが、自然的、社会的、経済的及び行政的観点からみて合理的と判断される地域をいう。",src:"総論第2章 I"},
{cat:"第2章",text:"【林地地域】とは、林業生産活動のうち【木竹又は特用林産物】の生育の用に供されることが合理的と判断される地域をいう。",src:"総論第2章 I"},
{cat:"第2章",text:"【更地】とは、建物等の定着物がなく、かつ、使用収益を制約する【権利の付着していない】宅地をいう。",src:"総論第2章 II"},
{cat:"第2章",text:"【建付地】とは、建物等の用に供されている敷地で建物等及びその敷地が【同一の所有者】に属している宅地をいう。",src:"総論第2章 II"},
{cat:"第2章",text:"【借地権】とは、借地借家法（廃止前の借地法を含む。）に基づく借地権（建物の所有を目的とする【地上権】又は土地の【賃借権】）をいう。",src:"総論第2章 II"},
{cat:"第2章",text:"【底地】とは、宅地について【借地権】の付着している場合における当該宅地の【所有権】をいう。",src:"総論第2章 II"},
{cat:"第2章",text:"【区分地上権】とは、工作物を所有するため、【地下又は空間】に上下の範囲を定めて設定された地上権をいう。",src:"総論第2章 II"},
{cat:"第2章",text:"【見込地】とは、宅地地域、農地地域、林地地域等の【相互間】において、ある種別の地域から他の種別の地域へと転換しつつある地域内の土地をいう。",src:"総論第2章 II"},
{cat:"第2章",text:"【移行地】とは、宅地地域、農地地域等のうちにあって、【細分された地域】相互の間で地域の移行が認められる状態にある土地をいう。",src:"総論第2章 II"},
{cat:"第2章",text:"自用の建物及びその敷地とは、建物所有者とその敷地の所有者とが同一であり、その所有者による【使用収益】を制約する権利の付着していない場合における当該建物及びその敷地をいう。",src:"総論第2章 II"},
{cat:"第2章",text:"貸家及びその敷地とは、建物所有者とその敷地の所有者とが同一であり、その建物が賃貸借に供されている場合における当該【建物及びその敷地】をいう。",src:"総論第2章 II"},
{cat:"第2章",text:"【借地権付建物】とは、借地権を権原とする建物が存する場合における当該建物及び【借地権】をいう。",src:"総論第2章 II"},
{cat:"第2章",text:"建物及びその敷地の類型は、【自用の建物及びその敷地】、【貸家及びその敷地】、【借地権付建物】、【区分所有建物及びその敷地】の4つである。",src:"総論第2章 II"},
{cat:"第2章",text:"宅地の類型は、【更地】、【建付地】、【借地権】、【底地】、【区分地上権】に加え、【区分所有権】が含まれる。",src:"総論第2章 II"},
{cat:"第2章",text:"不動産の種別と類型の【両面】の分析をまって初めて精度の高い鑑定評価が可能となる。",src:"総論第2章"},
{cat:"第2章",text:"地域の種別は、【宅地地域】、【農地地域】、【林地地域】等に分けられる。見込地地域は地域の種別ではない。",src:"総論第2章 I"},
{cat:"第2章",text:"【借家権】とは、借地借家法（廃止前の借家法を含む。）が適用される建物の【賃借権】をいう。",src:"各論第1章"}
],
def3:[
{cat:"第3章",text:"【価格形成要因】とは、不動産の【効用】及び【相対的稀少性】並びに不動産に対する【有効需要】の三者に影響を与える要因をいう。",src:"総論第3章"},
{cat:"第3章",text:"【一般的要因】とは、一般経済社会における不動産のあり方及びその価格の水準に影響を与える要因をいう。それは、【自然的要因】、【社会的要因】、【経済的要因】及び【行政的要因】に大別される。",src:"総論第3章 I"},
{cat:"第3章",text:"【地域要因】とは、【一般的要因】の相関結合によって規模、構成の内容、機能等にわたる各地域の特性を形成し、その地域に属する不動産の価格の形成に【全般的な影響】を与える要因をいう。",src:"総論第3章 II"},
{cat:"第3章",text:"【個別的要因】とは、不動産に【個別性】を生じさせ、その価格を【個別的に形成】する要因をいう。",src:"総論第3章 III"},
{cat:"第3章",text:"鑑定評価を行うに当たっては、価格形成要因を【市場参加者】の観点から明確に把握し、その推移・動向・諸要因間の【相互関係】を十分に分析する必要がある。",src:"総論第3章（H26改正）"},
{cat:"第3章",text:"行政的要因の主なものは、(1)土地利用に関する【計画及び規制】の状態、(2)土地及び建築物の構造、防災等に関する規制の状態、(3)宅地及び住宅に関する施策の状態、(4)不動産に関する【税制】の状態、(5)不動産の【取引に関する規制】の状態である。",src:"総論第3章 I IV"},
{cat:"第3章",text:"社会的要因の主なものは、人口の状態、家族構成及び世帯分離の状態、都市形成及び【公共施設】の整備の状態、教育及び社会福祉の状態、不動産の取引及び【使用収益の慣行】、建築様式等の状態、【情報化】の進展の状態、【生活様式】等の状態である。",src:"総論第3章 I II"},
{cat:"第3章",text:"経済的要因の主なものは、貯蓄、消費、投資及び【国際収支】の状態、【財政】及び金融の状態、物価、雇用、賃金の状態、【税負担】の状態、企業活動の状態、技術革新及び【産業構造】の状態、交通体系の状態、【国際化】の状態である。",src:"総論第3章 I III"},
{cat:"第3章",text:"見込地及び移行地については、転換・移行の程度が低い場合は転換前・移行前の【個別的要因】をより重視し、程度が高い場合は転換後・移行後の個別的要因をより重視すべきである。",src:"総論第3章 留意事項"},
{cat:"第3章",text:"一般的要因の分析については、必ずしも鑑定評価報告書に【記載する必要がない】とされている。",src:"総論第3章 留意事項"}
],
def4:[
{cat:"第5章",text:"【正常価格】とは、市場性を有する不動産について、現実の社会経済情勢の下で合理的と考えられる条件を満たす市場で形成されるであろう【市場価値】を表示する適正な価格をいう。",src:"総論第5章 III"},
{cat:"第5章",text:"正常価格の市場の条件は、(1)市場参加者が【自由意思】に基づいて市場に参加し、(2)売り急ぎ、買い進み等をもたらす【特別な動機】のないこと、(3)対象不動産が【相当の期間】市場に公開されていること、(4)取引形態が特に制約されたり特別な動機がないことである。",src:"総論第5章 III"},
{cat:"第5章",text:"【通常の資金調達能力】とは、市場における標準的な借入条件の下での【借り入れ】と【自己資金】とによって資金調達を行うことができる能力をいう。",src:"総論第5章 留意事項"},
{cat:"第5章",text:"【相当の期間】とは、対象不動産の取得に際し必要となる情報が公開され、【需要者層】に十分浸透するまでの期間をいう。",src:"総論第5章 留意事項"},
{cat:"第5章",text:"公開されていることとは、【価格時点】において既に市場で公開されていた状況を想定することをいう。",src:"総論第5章 留意事項"},
{cat:"第5章",text:"【限定価格】とは、市場性を有する不動産について、不動産と取得する他の不動産との併合又は不動産の一部を取得する際の分割等に基づき正常価格と同一の市場概念の下において形成されるであろう【市場価値と乖離】することにより、市場が相対的に限定される場合における取得部分の当該市場限定に基づく市場価値を適正に表示する価格をいう。",src:"総論第5章 III"},
{cat:"第5章",text:"【特定価格】とは、市場性を有する不動産について、【法令等】による社会的要請を背景とする評価目的の下で、正常価格の前提となる諸条件を満たさない場合における不動産の経済価値を適正に表示する価格をいう。",src:"総論第5章 III"},
{cat:"第5章",text:"【特殊価格】とは、【文化財】等の一般的に市場性を有しない不動産について、その利用現況等を前提とした不動産の経済価値を適正に表示する価格をいう。",src:"総論第5章 III"},
{cat:"第5章",text:"【正常賃料】とは、正常価格と同一の【市場概念】の下において新たな賃貸借等の契約において成立するであろう経済価値を表示する適正な賃料（【新規賃料】）をいう。",src:"総論第5章 III"},
{cat:"第5章",text:"【限定賃料】とは、限定価格と同一の市場概念の下において新たな賃貸借等の契約において成立するであろう経済価値を適正に表示する賃料（新規賃料）をいう。",src:"総論第5章 III"},
{cat:"第5章",text:"【継続賃料】とは、不動産の賃貸借等の継続に係る【特定の当事者間】において成立するであろう経済価値を適正に表示する賃料をいう。",src:"総論第5章 III"},

const catNames={def1:'不動産・価格の定義',def2:'種別・類型の定義',def3:'価格形成要因の定義',def4:'価格・賃料の種類の定義',def5:'鑑定評価の方式の定義',def6:'地域分析・個別分析の定義',prin:'価格に関する諸原則',cond:'条件設定・手順・報告書'};
let curCat='',qs=[],idx=0,sc=0,wl=[],retry=false;

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}

function startQuiz(cat){
  curCat=cat;retry=false;
  if(cat==='all'){
    qs=[];for(const k of Object.keys(Q))Q[k].forEach(q=>qs.push({...q}));
  }else{
    qs=Q[cat].map(q=>({...q}));
  }
  shuffle(qs);idx=0;sc=0;wl=[];showQuiz();
}

function retryWrong(){if(!wl.length){backToMenu();return}retry=true;qs=[...wl];shuffle(qs);idx=0;sc=0;wl=[];showQuiz()}

function showQuiz(){
  document.getElementById('menuView').classList.add('hidden');
  document.getElementById('resultView').classList.add('hidden');
  document.getElementById('quizView').classList.remove('hidden');
  document.getElementById('progressBar').style.display='block';
  showQ();
}

function showQ(){
  const q=qs[idx];
  document.getElementById('chapterLabel').textContent=q.cat;
  document.getElementById('qNumber').textContent=`問 ${idx+1} / ${qs.length}`;
  document.getElementById('headerSub').textContent=retry?'復習モード':(curCat==='all'?'全問まとめ':(catNames[curCat]||''));
  document.getElementById('sourceText').textContent='出典: '+q.src;
  // Parse text with 【】 as blanks
  const html=q.text.replace(/【(.*?)】/g,function(m,p1){
    return '<span class="blank" data-answer="'+p1.replace(/"/g,'&quot;')+'">'+p1.replace(/./g,'_')+'</span>';
  });
  document.getElementById('cardText').innerHTML=html;
  document.getElementById('revealBtn').style.display='block';
  document.getElementById('judgeRow').style.display='none';
  document.getElementById('nextBtn').style.display='none';
  document.getElementById('progressFill').style.width=(idx/qs.length*100)+'%';
  window.scrollTo(0,0);
}

function revealAll(){
  document.querySelectorAll('.blank').forEach(el=>{
    el.textContent=el.dataset.answer;
    el.classList.add('revealed');
  });
  document.getElementById('revealBtn').style.display='none';
  document.getElementById('judgeRow').style.display='flex';
}

function judge(ok){
  if(ok)sc++;else wl.push(qs[idx]);
  document.getElementById('judgeRow').style.display='none';
  document.getElementById('nextBtn').style.display='block';
  document.getElementById('nextBtn').textContent=idx<qs.length-1?'次の問題へ':'結果を見る';
}

function nextQ(){idx++;if(idx>=qs.length)showResult();else showQ()}

function showResult(){
  document.getElementById('quizView').classList.add('hidden');
  document.getElementById('resultView').classList.remove('hidden');
  document.getElementById('progressBar').style.display='none';
  document.getElementById('resultScore').textContent=sc+' / '+qs.length;
  const p=Math.round(sc/qs.length*100);
  document.getElementById('resultText').textContent=`暗記率 ${p}%　${p===100?'完璧です！':p>=80?'よく覚えています！':p>=60?'もう少し！':'繰り返し復習しましょう！'}`;
  document.getElementById('headerSub').textContent='結果';
}
